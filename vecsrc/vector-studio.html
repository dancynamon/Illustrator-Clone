<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquamentor Vector Studio</title>
<style>
  :root {
    --bg: #323232;          /* app chrome */
    --panel: #2a2a2b;       /* panel bodies */
    --panel-head: #383838;  /* panel section headers */
    --edge: #1f1f1f;        /* borders between chrome regions */
    --canvas: #1b1b1b;      /* pasteboard behind artboard */
    --text: #d6d6d6;
    --text-dim: #9a9a9a;
    --accent: #3a8ee6;      /* selection / active-tool blue */
    --tool: #b8b8b8;        /* toolbar icon color */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 12px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: grid;
    grid-template-rows: 28px 1fr 22px;
    grid-template-columns: 40px 1fr 240px;
    grid-template-areas:
      "menu menu menu"
      "tools stage panels"
      "status status status";
    user-select: none; -webkit-user-select: none;
  }

  /* ---- menu bar ---- */
  #menubar {
    grid-area: menu; display: flex; align-items: center;
    background: var(--bg); border-bottom: 1px solid var(--edge);
    padding: 0 10px; gap: 2px;
  }
  #menubar .brand {
    font-weight: 600; color: var(--text); margin-right: 14px;
    letter-spacing: .2px;
  }
  #menubar .brand span { color: var(--accent); }
  #menubar .menu {
    padding: 3px 9px; border-radius: 3px; color: var(--text-dim); cursor: default;
  }
  #menubar .menu:hover, #menubar .menu.open { background: #3f3f40; color: var(--text); }

  /* ---- dropdown menus ---- */
  .dropdown {
    position: fixed; min-width: 180px; z-index: 100;
    background: #2f2f30; border: 1px solid #1a1a1a; border-radius: 4px;
    padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  .dropdown .item {
    display: flex; justify-content: space-between; gap: 24px;
    padding: 5px 10px; border-radius: 3px; color: var(--text); cursor: default;
  }
  .dropdown .item:hover:not(.disabled) { background: var(--accent); color: #fff; }
  .dropdown .item.disabled { color: #6a6a6a; }
  .dropdown .kbd { color: var(--text-dim); }
  .dropdown .item:hover:not(.disabled) .kbd { color: #dbe9ff; }

  /* ---- left toolbar ---- */
  #toolbar {
    grid-area: tools; background: var(--bg); border-right: 1px solid var(--edge);
    display: flex; flex-direction: column; align-items: center; padding-top: 6px; gap: 2px;
  }
  #toolbar button {
    width: 32px; height: 30px; border: 0; border-radius: 4px;
    background: transparent; color: var(--tool); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #toolbar button:hover { background: #3f3f40; color: #fff; }
  #toolbar button.active { background: var(--accent); color: #fff; }
  #toolbar .sep { width: 22px; height: 1px; background: var(--edge); margin: 4px 0; }
  #toolbar svg { width: 17px; height: 17px; display: block; }

  /* ---- stage ---- */
  #stagewrap { grid-area: stage; position: relative; background: var(--canvas); overflow: hidden; }
  #stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #stagewrap.tool-hand #stage { cursor: grab; }
  #stagewrap.tool-hand.panning #stage { cursor: grabbing; }
  #stagewrap.tool-zoom #stage { cursor: zoom-in; }

  /* ---- right panels ---- */
  #panels {
    grid-area: panels; background: var(--panel); border-left: 1px solid var(--edge);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .panel { border-bottom: 1px solid var(--edge); }
  .panel > h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim); background: var(--panel-head);
    padding: 5px 10px; cursor: default;
  }
  .panel .body { padding: 8px 10px; }
  .prow { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
  .prow .k { color: var(--text-dim); }
  .prow .v { color: var(--text); font-variant-numeric: tabular-nums; }
  .pbtns { display: flex; gap: 6px; margin-top: 6px; }
  .pbtns button {
    flex: 1; padding: 4px 0; border: 1px solid #4a4a4a; border-radius: 3px;
    background: #3a3a3b; color: var(--text); cursor: pointer; font-size: 11px;
  }
  .pbtns button:hover { background: #454546; }

  /* align panel */
  .alignrow { display: flex; gap: 4px; margin-bottom: 4px; }
  .alignrow button {
    width: 30px; height: 26px; border: 1px solid #4a4a4a; border-radius: 3px;
    background: #3a3a3b; color: var(--tool); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .alignrow button:hover:not([disabled]) { background: #454546; color: #fff; }
  .alignrow button[disabled] { opacity: .35; cursor: default; }
  .alignrow svg { width: 15px; height: 15px; }

  /* layers list */
  #layerlist { list-style: none; }
  #layerlist li {
    display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 3px;
  }
  #layerlist li:hover { background: #343435; }
  #layerlist .eye { cursor: pointer; width: 16px; text-align: center; color: var(--text-dim); }
  #layerlist .eye.on { color: var(--text); }
  #layerlist .lname { flex: 1; }

  /* ---- status bar ---- */
  #statusbar {
    grid-area: status; display: flex; align-items: center; gap: 18px;
    background: var(--bg); border-top: 1px solid var(--edge);
    padding: 0 12px; color: var(--text-dim); font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  #statusbar .right { margin-left: auto; display: flex; gap: 18px; }
</style>
</head>
<body>

<div id="menubar">
  <div class="brand">AQ<span>Vector</span></div>
  <div class="menu" data-menu="file">File</div>
  <div class="menu" data-menu="edit">Edit</div>
  <div class="menu" data-menu="object">Object</div>
  <div class="menu">View</div>
  <div class="menu">Window</div>
</div>

<div id="toolbar">
  <button data-tool="select" title="Selection (V)">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M6 2 L6 16 L9.6 12.6 L12 18 L14.2 17 L11.8 11.8 L16.5 11.5 Z"/></svg>
  </button>
  <button data-tool="direct" title="Direct Selection (A)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 2.8 L6 15 L9.4 11.9 L11.8 16.8 L13.7 15.9 L11.5 11.2 L15.6 10.9 Z"/></svg>
  </button>
  <div class="sep"></div>
  <button data-tool="pen" title="Pen (P)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 2 L13 9 L10 13 L7 9 Z"/><path d="M10 13 L10 17"/><circle cx="10" cy="10" r="1" fill="currentColor" stroke="none"/></svg>
  </button>
  <button data-tool="rect" title="Rectangle (M)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="5" width="13" height="10"/></svg>
  </button>
  <button data-tool="ellipse" title="Ellipse (L)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><ellipse cx="10" cy="10" rx="6.5" ry="5"/></svg>
  </button>
  <div class="sep"></div>
  <button data-tool="hand" title="Hand (H) — or hold Space">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 10.5 V4.8 a1.2 1.2 0 0 1 2.4 0 V9 M9.4 9 V3.8 a1.2 1.2 0 0 1 2.4 0 V9 M11.8 9 V4.8 a1.2 1.2 0 0 1 2.4 0 V11.5 c0 3-1.8 5.5-4.6 5.5 c-2.4 0-3.6-1.2-4.8-3.6 L3.4 11.6 a1.15 1.15 0 0 1 2-1.1 L7 12.5"/></svg>
  </button>
  <button data-tool="zoom" title="Zoom (Z) — click in, Alt-click out">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 L17 17"/><path d="M6.5 9 H11.5 M9 6.5 V11.5"/></svg>
  </button>
</div>

<div id="stagewrap">
  <canvas id="stage"></canvas>
</div>

<div id="panels">
  <div class="panel">
    <h2>Properties</h2>
    <div class="body">
      <div class="prow"><span class="k">Document</span><span class="v" id="p-name">—</span></div>
      <div class="prow"><span class="k">Artboard</span><span class="v" id="p-artboard">—</span></div>
      <div class="prow"><span class="k">Zoom</span><span class="v" id="p-zoom">—</span></div>
      <div class="prow"><span class="k">Tool</span><span class="v" id="p-tool">—</span></div>
      <div class="prow"><span class="k">Selection</span><span class="v" id="p-sel">—</span></div>
      <div class="pbtns">
        <button id="btn-fit" title="Cmd+0">Fit</button>
        <button id="btn-100" title="Cmd+1">100%</button>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>Align</h2>
    <div class="body">
      <div class="alignrow">
        <button data-align="left" title="Align left edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 2v12"/><rect x="5" y="3.5" width="8" height="3.2"/><rect x="5" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="hcenter" title="Align horizontal centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M8 2v12"/><rect x="4" y="3.5" width="8" height="3.2"/><rect x="5.5" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="right" title="Align right edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M13 2v12"/><rect x="3" y="3.5" width="8" height="3.2"/><rect x="6" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="hdist" title="Distribute horizontal centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 3v10M8 3v10M13 3v10"/></svg>
        </button>
      </div>
      <div class="alignrow">
        <button data-align="top" title="Align top edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3h12"/><rect x="3.5" y="5" width="3.2" height="8"/><rect x="9.3" y="5" width="3.2" height="5"/></svg>
        </button>
        <button data-align="vcenter" title="Align vertical centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 8h12"/><rect x="3.5" y="4" width="3.2" height="8"/><rect x="9.3" y="5.5" width="3.2" height="5"/></svg>
        </button>
        <button data-align="bottom" title="Align bottom edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 13h12"/><rect x="3.5" y="3" width="3.2" height="8"/><rect x="9.3" y="6" width="3.2" height="5"/></svg>
        </button>
        <button data-align="vdist" title="Distribute vertical centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 3h10M3 8h10M3 13h10"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>Layers</h2>
    <div class="body"><ul id="layerlist"></ul></div>
  </div>
</div>

<div id="statusbar">
  <span id="s-coords">x: — y: —</span>
  <div class="right">
    <span id="s-tool">Selection</span>
    <span id="s-zoom">100%</span>
  </div>
</div>

<script>
// VECCORE — pure document/geometry core for Aquamentor Vector Studio.
// No DOM. Document coordinates are PDF points (1/72 in), y-down like SVG;
// the PDF exporter flips y. Loaded in-browser via build concat and in node
// tests via require.
const VECCORE = (() => {
  'use strict';

  const PT_PER = { in: 72, mm: 72 / 25.4, pt: 1 };
  // 100% zoom = 96 CSS px per inch (screen convention), i.e. 96/72 px per pt.
  const PX_PER_PT_100 = 96 / 72;

  // ---------- document ----------
  function newDoc(o = {}) {
    const units = o.units || 'in';
    const k = PT_PER[units];
    return {
      name: o.name || 'Untitled',
      units,
      artboard: { w: (o.w != null ? o.w : 8.5) * k, h: (o.h != null ? o.h : 11) * k },
      layers: [{ id: 'L1', name: 'Layer 1', visible: true, locked: false }],
      shapes: [],
      groups: [],
      nextId: 1,
    };
  }

  function addShape(doc, shape) {
    shape.id = 'S' + doc.nextId++;
    if (!shape.layer) shape.layer = doc.layers[0].id;
    if (shape.fill === undefined) shape.fill = null;
    if (shape.stroke === undefined) shape.stroke = null;
    if (shape.opacity == null) shape.opacity = 1;
    if (shape.group === undefined) shape.group = null;
    doc.shapes.push(shape);
    return shape;
  }

  // ---------- view (world pt <-> screen px) ----------
  // screen = world*scale + t
  function newView() { return { scale: PX_PER_PT_100, tx: 0, ty: 0 }; }
  function w2s(v, x, y) { return [x * v.scale + v.tx, y * v.scale + v.ty]; }
  function s2w(v, x, y) { return [(x - v.tx) / v.scale, (y - v.ty) / v.scale]; }

  // Zoom by factor f keeping screen point (sx,sy) fixed on the same world point.
  function zoomAt(v, sx, sy, f, min = 0.02, max = 96) {
    const ns = Math.min(max, Math.max(min, v.scale * f));
    const wx = (sx - v.tx) / v.scale, wy = (sy - v.ty) / v.scale;
    return { scale: ns, tx: sx - wx * ns, ty: sy - wy * ns };
  }

  function panBy(v, dx, dy) { return { scale: v.scale, tx: v.tx + dx, ty: v.ty + dy }; }

  // View that fits world rect (x,y,w,h) centered in a vw×vh viewport.
  // Padding shrinks on small viewports; scale is always positive.
  function fitRect(vw, vh, x, y, w, h, pad = 40) {
    pad = Math.max(0, Math.min(pad, vw * 0.1, vh * 0.1));
    const s = Math.max(1e-6, Math.min((vw - 2 * pad) / w, (vh - 2 * pad) / h));
    return { scale: s, tx: (vw - w * s) / 2 - x * s, ty: (vh - h * s) / 2 - y * s };
  }

  function zoomPct(v) { return v.scale / PX_PER_PT_100 * 100; }

  // ---------- paths ----------
  // A path is an array of commands: ['M',x,y] ['L',x,y] ['C',x1,y1,x2,y2,x,y] ['Z'].
  // Maps 1:1 onto canvas, SVG, and PDF operators.

  const KAPPA = 0.5522847498307936; // cubic circle approximation constant

  function rectPath(x, y, w, h, r = 0) {
    if (r <= 0) return [['M', x, y], ['L', x + w, y], ['L', x + w, y + h], ['L', x, y + h], ['Z']];
    r = Math.min(r, w / 2, h / 2);
    const k = KAPPA * r;
    return [
      ['M', x + r, y],
      ['L', x + w - r, y], ['C', x + w - r + k, y, x + w, y + r - k, x + w, y + r],
      ['L', x + w, y + h - r], ['C', x + w, y + h - r + k, x + w - r + k, y + h, x + w - r, y + h],
      ['L', x + r, y + h], ['C', x + r - k, y + h, x, y + h - r + k, x, y + h - r],
      ['L', x, y + r], ['C', x, y + r - k, x + r - k, y, x + r, y],
      ['Z'],
    ];
  }

  function ellipsePath(cx, cy, rx, ry) {
    const kx = KAPPA * rx, ky = KAPPA * ry;
    return [
      ['M', cx + rx, cy],
      ['C', cx + rx, cy + ky, cx + kx, cy + ry, cx, cy + ry],
      ['C', cx - kx, cy + ry, cx - rx, cy + ky, cx - rx, cy],
      ['C', cx - rx, cy - ky, cx - kx, cy - ry, cx, cy - ry],
      ['C', cx + kx, cy - ry, cx + rx, cy - ky, cx + rx, cy],
      ['Z'],
    ];
  }

  function starPath(cx, cy, rOut, rIn, points = 5) {
    const cmds = [];
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOut : rIn;
      const a = -Math.PI / 2 + i * Math.PI / points;
      cmds.push([i === 0 ? 'M' : 'L', cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }
    cmds.push(['Z']);
    return cmds;
  }

  // Bounding box over all coordinates in the command list (control points
  // included — conservative for curves, exact for the shapes above).
  function pathBBox(cmds) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const c of cmds) {
      for (let i = 1; i + 1 <= c.length; i += 2) {
        const x = c[i], y = c[i + 1];
        if (typeof x !== 'number' || typeof y !== 'number') continue;
        if (x < x0) x0 = x; if (y < y0) y0 = y;
        if (x > x1) x1 = x; if (y > y1) y1 = y;
      }
    }
    if (x0 === Infinity) return null;
    return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
  }

  // ---------- affine matrices ----------
  // m = [a,b,c,d,e,f]: x' = a·x + c·y + e ; y' = b·x + d·y + f
  function mMul(m2, m1) { // m1 applied first, then m2
    return [
      m2[0] * m1[0] + m2[2] * m1[1], m2[1] * m1[0] + m2[3] * m1[1],
      m2[0] * m1[2] + m2[2] * m1[3], m2[1] * m1[2] + m2[3] * m1[3],
      m2[0] * m1[4] + m2[2] * m1[5] + m2[4], m2[1] * m1[4] + m2[3] * m1[5] + m2[5],
    ];
  }
  function mTranslate(dx, dy) { return [1, 0, 0, 1, dx, dy]; }
  function mScale(sx, sy, cx = 0, cy = 0) { return [sx, 0, 0, sy, cx - sx * cx, cy - sy * cy]; }
  function mRotate(rad, cx = 0, cy = 0) {
    const c = Math.cos(rad), s = Math.sin(rad);
    return [c, s, -s, c, cx - c * cx + s * cy, cy - s * cx - c * cy];
  }
  function mApply(m, x, y) { return [m[0] * x + m[2] * y + m[4], m[1] * x + m[3] * y + m[5]]; }

  function transformCmds(cmds, m) {
    return cmds.map(c => {
      if (c[0] === 'Z') return ['Z'];
      const o = [c[0]];
      for (let i = 1; i + 1 <= c.length; i += 2) {
        const p = mApply(m, c[i], c[i + 1]);
        o.push(p[0], p[1]);
      }
      return o;
    });
  }

  // ---------- flattening, tight bounds, hit testing ----------
  // Flatten to polyline subpaths: [{pts:[[x,y]...], closed}]. Fixed cubic
  // subdivision is plenty for hit tests and bounds at document scale.
  function flattenPath(cmds, seg = 16) {
    const subs = [];
    let cur = null, sx = 0, sy = 0, px = 0, py = 0;
    for (const c of cmds) {
      if (c[0] === 'M') {
        cur = { pts: [[c[1], c[2]]], closed: false };
        subs.push(cur);
        px = sx = c[1]; py = sy = c[2];
      } else if (c[0] === 'L') {
        if (!cur) continue;
        cur.pts.push([c[1], c[2]]);
        px = c[1]; py = c[2];
      } else if (c[0] === 'C') {
        if (!cur) continue;
        for (let i = 1; i <= seg; i++) {
          const t = i / seg, u = 1 - t;
          cur.pts.push([
            u * u * u * px + 3 * u * u * t * c[1] + 3 * u * t * t * c[3] + t * t * t * c[5],
            u * u * u * py + 3 * u * u * t * c[2] + 3 * u * t * t * c[4] + t * t * t * c[6],
          ]);
        }
        px = c[5]; py = c[6];
      } else if (c[0] === 'Z') {
        if (cur) cur.closed = true;
        px = sx; py = sy;
      }
    }
    return subs;
  }

  function tightBBox(cmds) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const s of flattenPath(cmds)) {
      for (const p of s.pts) {
        if (p[0] < x0) x0 = p[0]; if (p[1] < y0) y0 = p[1];
        if (p[0] > x1) x1 = p[0]; if (p[1] > y1) y1 = p[1];
      }
    }
    return x0 === Infinity ? null : { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
  }

  function shapesBBox(shapes) {
    let out = null;
    for (const s of shapes) {
      const b = tightBBox(s.cmds);
      if (!b) continue;
      if (!out) out = { ...b };
      else {
        const x1 = Math.max(out.x + out.w, b.x + b.w), y1 = Math.max(out.y + out.h, b.y + b.h);
        out.x = Math.min(out.x, b.x); out.y = Math.min(out.y, b.y);
        out.w = x1 - out.x; out.h = y1 - out.y;
      }
    }
    return out;
  }

  function windingNumber(pts, x, y) {
    let wn = 0;
    for (let i = 0, n = pts.length; i < n; i++) {
      const a = pts[i], b = pts[(i + 1) % n];
      const cross = (b[0] - a[0]) * (y - a[1]) - (x - a[0]) * (b[1] - a[1]);
      if (a[1] <= y) { if (b[1] > y && cross > 0) wn++; }
      else if (b[1] <= y && cross < 0) wn--;
    }
    return wn;
  }

  function distToSubpath(sub, x, y) {
    const pts = sub.pts, n = pts.length;
    const last = sub.closed ? n : n - 1;
    let d = Infinity;
    for (let i = 0; i < last; i++) {
      const a = pts[i], b = pts[(i + 1) % n];

    return rgbHex((1 - clamp01(c)) * (1 - clamp01(k)), (1 - clamp01(m)) * (1 - clamp01(k)), (1 - clamp01(y)) * (1 - clamp01(k)));
  }
  // sc/scn/SC/SCN carry 1 (gray/tint), 3 (rgb) or 4 (cmyk) numbers; a trailing
  // /Name operand (patterns) leaves the color as-is. Separation tints darken from white.
  function componentsHex(nums, prev) {
    if (nums.length >= 4) return cmykHex(nums[nums.length-4], nums[nums.length-3], nums[nums.length-2], nums[nums.length-1]);
    if (nums.length === 3) return rgbHex(nums[0], nums[1], nums[2]);
    if (nums.length === 1) return grayHex(nums[0]);
    return prev;
  }

  // Interpret one content stream, appending studio shapes (points, y-down) to `out`.
  function interpretContent(s, out, ctx) {
    ctx = ctx || {};
    const n = s.length;
    let i = 0;
    // Full graphics state; q/Q save/restore all of it (colors travel with the CTM).
    let gs = ctx.baseGS ? Object.assign({}, ctx.baseGS) : {
      ctm: [1, 0, 0, 1, 0, 0], fill: '#000000', stroke: '#000000', lw: 1, ca: 1, CA: 1,
    };
    if (ctx.baseCTM) gs.ctm = ctx.baseCTM.slice();
    const xobjMap = ctx.xobjMap || {};
    const gsMap = ctx.gsMap || {};
    const stack = [], ops = [];
    let cmds = [], cur = null, start = null, hasDraw = false, lastName = null;

    function tf(x, y) { const m = gs.ctm; return [m[0]*x + m[2]*y + m[4], m[1]*x + m[3]*y + m[5]]; }
    function scaleF() { const m = gs.ctm; return Math.sqrt(Math.abs(m[0]*m[3] - m[1]*m[2])); }
    function moveTo(x, y) { const p = tf(x, y); cmds.push(['M', p[0], p[1]]); cur = [x, y]; start = [x, y]; }
    function lineTo(x, y) {
      if (!cur) { moveTo(x, y); return; }
      const p = tf(x, y); cmds.push(['L', p[0], p[1]]); cur = [x, y]; hasDraw = true;
    }
    function curveTo(x1, y1, x2, y2, x3, y3) {
      if (!cur) moveTo(x1, y1);
      const c1 = tf(x1, y1), c2 = tf(x2, y2), e = tf(x3, y3);
      cmds.push(['C', c1[0], c1[1], c2[0], c2[1], e[0], e[1]]);
      cur = [x3, y3]; hasDraw = true;
    }
    function rect(x, y, w, h) {
      moveTo(x, y); lineTo(x + w, y); lineTo(x + w, y + h); lineTo(x, y + h);
      cmds.push(['Z']); cur = [x, y]; start = [x, y];
    }
    function closepath() {
      if (cur && cmds.length && cmds[cmds.length - 1][0] !== 'Z') {
        cmds.push(['Z']);
        if (start) cur = [start[0], start[1]];
        hasDraw = true;
      }
    }
    function resetPath() { cmds = []; cur = null; start = null; hasDraw = false; }
    // One shape per paint op: every subpath since the last paint, with the
    // appearance in force right now. `n` (and pure clip installs) discards.
    function paint(doFill, doStroke, close) {
      if (close) closepath();
      if (hasDraw && cmds.length >= 2) {
        const shape = {
          type: 'path',
          cmds: cmds,
          fill: doFill ? gs.fill : null,
          stroke: doStroke ? { color: gs.stroke, w: Math.max(gs.lw * scaleF(), 0.1) } : null,
          opacity: doFill ? gs.ca : gs.CA,
        };
        out.shapes.push(shape);
      }
      resetPath();
    }
    function doExtGState(name) {            // `/Name gs` -> constant alpha from the ExtGState dict
      if (!name) return;
      let dict = null;
      const on = gsMap[name];
      if (on != null && ctx.objs && ctx.objs[on]) dict = ctx.objs[on].dictStr;
      else if (typeof on === 'string') dict = on;             // inline dict captured from resources
      if (!dict) return;
      const ca = dict.match(/\/ca\s+([0-9.]+)/);
      const CA = dict.match(/\/CA\s+([0-9.]+)/);
      if (ca) gs.ca = clamp01(parseFloat(ca[1]));
      if (CA) gs.CA = clamp01(parseFloat(CA[1]));
    }
    function doXObject(name) {              // resolve `/Name Do` -> Form XObject, apply /Matrix, recurse
      if (!name || !ctx.objs) return;
      const on = xobjMap[name];
      if (on == null || (ctx.seen && ctx.seen[on])) return;           // unknown or cycle
      const o = ctx.objs[on];
      if (!o || !/\/Subtype\s*\/Form\b/.test(o.dictStr)) return;       // Form XObjects only (skip images)
      const content = getStreamContent(o, ctx.u8);
      if (!content) return;
      let M = [1, 0, 0, 1, 0, 0];
      const mm = o.dictStr.match(/\/Matrix\s*\[\s*([-0-9.eE\s]+)\]/);
      if (mm) { const nums = mm[1].trim().split(/\s+/).map(parseFloat); if (nums.length === 6 && nums.every(x => !isNaN(x))) M = nums; }
      const childRes = dictAfter(o.dictStr, 'Resources', ctx.objs) || ctx.resourcesDict || null;
      const seen2 = {}; if (ctx.seen) for (const k in ctx.seen) seen2[k] = true; seen2[on] = true;
      const childGS = Object.assign({}, gs, { ctm: matMul(M, gs.ctm) });
      interpretContent(content, out, {
        objs: ctx.objs, u8: ctx.u8, baseGS: childGS,
        xobjMap: xobjectMap(childRes, ctx.objs), gsMap: extGStateMap(childRes, ctx.objs),
        resourcesDict: childRes, seen: seen2, stats: ctx.stats,
      });
    }

    function dispatch(op) {
      switch (op) {
        case 'q': stack.push(Object.assign({}, gs, { ctm: gs.ctm.slice() })); break;
        case 'Q': if (stack.length) gs = stack.pop(); break;
        case 'cm': { const a = ops.slice(-6); if (a.length === 6) gs.ctm = matMul(a, gs.ctm); break; }
        case 'm': { const a = ops.slice(-2); moveTo(a[0], a[1]); break; }
        case 'l': { const a = ops.slice(-2); lineTo(a[0], a[1]); break; }
        case 'c': { const a = ops.slice(-6); curveTo(a[0], a[1], a[2], a[3], a[4], a[5]); break; }
        case 'v': { const a = ops.slice(-4); if (cur) curveTo(cur[0], cur[1], a[0], a[1], a[2], a[3]); break; }
        case 'y': { const a = ops.slice(-4); curveTo(a[0], a[1], a[2], a[3], a[2], a[3]); break; }
        case 're': { const a = ops.slice(-4); rect(a[0], a[1], a[2], a[3]); break; }
        case 'h': closepath(); break;
        case 'S': paint(false, true, false); break;
        case 's': paint(false, true, true); break;
        case 'f': case 'F': case 'f*': paint(true, false, true); break;
        case 'B': case 'B*': paint(true, true, true); break;
        case 'b': case 'b*': paint(true, true, true); break;
        case 'n': resetPath(); break;       // clip/no-op: discard, don't emit
        // color state
        case 'g': { const a = ops.slice(-1); gs.fill = grayHex(a[0]); break; }
        case 'G': { const a = ops.slice(-1); gs.stroke = grayHex(a[0]); break; }
        case 'rg': { const a = ops.slice(-3); if (a.length === 3) gs.fill = rgbHex(a[0], a[1], a[2]); break; }
        case 'RG': { const a = ops.slice(-3); if (a.length === 3) gs.stroke = rgbHex(a[0], a[1], a[2]); break; }
        case 'k': { const a = ops.slice(-4); if (a.length === 4) gs.fill = cmykHex(a[0], a[1], a[2], a[3]); break; }
        case 'K': { const a = ops.slice(-4); if (a.length === 4) gs.stroke = cmykHex(a[0], a[1], a[2], a[3]); break; }
        case 'sc': case 'scn': gs.fill = componentsHex(ops, gs.fill); break;
        case 'SC': case 'SCN': gs.stroke = componentsHex(ops, gs.stroke); break;
        case 'cs': gs.fill = '#000000'; break;      // colorspace select resets to the space's initial color (black)
        case 'CS': gs.stroke = '#000000'; break;
        case 'w': { const a = ops.slice(-1); if (isFinite(a[0]) && a[0] >= 0) gs.lw = a[0]; break; }
        case 'gs': doExtGState(lastName); break;
        case 'Do': doXObject(lastName); break;                              // Form XObject: recurse into its content
        case 'Tj': case 'TJ': case "'": case '"': if (ctx.stats) ctx.stats.text++; break;  // live text shown (not outlined) -> flag it
        case 'BI': i = skipInlineImage(s, i); break;
        default: break;
      }
      ops.length = 0; lastName = null;
    }

    while (i < n) {
      const ch = s[i];
      if (isWS(ch)) { i++; continue; }
      if (ch === '%') { while (i < n && s[i] !== '\n' && s[i] !== '\r') i++; continue; }
      if (ch === '(') { let d = 1; i++; while (i < n && d > 0) { const c = s[i++]; if (c === '\\') i++; else if (c === '(') d++; else if (c === ')') d--; } ops.push(0); continue; }
      if (ch === '<') {
        if (s[i + 1] === '<') { let d = 1; i += 2; while (i < n && d > 0) { if (s[i] === '<' && s[i + 1] === '<') { d++; i += 2; } else if (s[i] === '>' && s[i + 1] === '>') { d--; i += 2; } else i++; } continue; }
        i++; while (i < n && s[i] !== '>') i++; i++; ops.push(0); continue;
      }
      if (ch === '[') { i++; while (i < n && s[i] !== ']') { if (s[i] === '(') { let d = 1; i++; while (i < n && d > 0) { const c = s[i++]; if (c === '\\') i++; else if (c === '(') d++; else if (c === ')') d--; } } else i++; } i++; continue; }
      if (ch === ']' || ch === '{' || ch === '}' || ch === ')') { i++; continue; }
      if (ch === '/') { const st = i + 1; i = st; while (i < n && !isDelim(s[i]) && !isWS(s[i])) i++; lastName = s.slice(st, i); continue; }
      if (ch === '-' || ch === '+' || ch === '.' || (ch >= '0' && ch <= '9')) {
        let j = i + 1; while (j < n) { const c = s[j]; if ((c >= '0' && c <= '9') || c === '.' || c === '-' || c === '+' || c === 'e' || c === 'E') j++; else break; }
        const num = parseFloat(s.slice(i, j)); ops.push(isNaN(num) ? 0 : num); i = j; continue;
      }
      let j = i; while (j < n && !isDelim(s[j]) && !isWS(s[j])) j++;
      const op = s.slice(i, j); i = j;
      dispatch(op);
    }
  }

  // Skip an inline image (BI ... ID <binary> EI). `i` points just past 'BI'. Returns index past 'EI'.
  function skipInlineImage(s, i) {
    const id = s.indexOf('ID', i);
    if (id < 0) return s.length;
    let k = id + 2;
    while (k < s.length - 1) {
      if (s[k] === 'E' && s[k + 1] === 'I' && (k + 2 >= s.length || isWS(s[k + 2])) && isWS(s[k - 1])) return k + 2;
      k++;
    }
    return s.length;
  }

  // ---- object map + resource resolution ----

  // Inflate/read a stream object's decoded content, or null (non-Flate filters skipped).
  function getStreamContent(o, u8) {
    if (!o || !o.hasStream) return null;
    const raw = u8.subarray(o.dataStart, o.dataEnd);
    if (/FlateDecode/.test(o.filter || '')) { try { const inf = pdfInflate(raw); return u8ToStr(inf, 0, inf.length); } catch (e) { return null; } }
    if (!o.filter) return u8ToStr(raw, 0, raw.length);
    return null;
  }

  // Brute-force scan every `N G obj … endobj` (works regardless of xref style). Returns { num: {dictStr,hasStream,dataStart,dataEnd,filter} }.
  function scanObjects(whole, u8) {
    const objs = {};
    const re = /(\d+)\s+(\d+)\s+obj\b/g;
    let m;
    while ((m = re.exec(whole))) {
      const num = parseInt(m[1], 10);
      const objStart = m.index + m[0].length;
      const endobj = whole.indexOf('endobj', objStart);
      const boundary = endobj < 0 ? whole.length : endobj;
      const streamKw = whole.indexOf('stream', objStart);
      let hasStream = false, dataStart = -1, dataEnd = -1, filter = '', dictStr;
      if (streamKw >= 0 && streamKw < boundary) {
        dictStr = whole.slice(objStart, streamKw);
        hasStream = true;
        let ds = streamKw + 6; if (whole[ds] === '\r') ds++; if (whole[ds] === '\n') ds++;
        const es = whole.indexOf('endstream', ds);
        let de = es < 0 ? boundary : es;
        if (whole[de - 1] === '\n') de--; if (whole[de - 1] === '\r') de--;
        const lm = dictStr.match(/\/Length\s+(\d+)(?!\s+\d+\s+R)/);
        if (lm) { const L = parseInt(lm[1], 10); if (ds + L <= u8.length) de = ds + L; }
        dataStart = ds; dataEnd = de;
        const fm = dictStr.match(/\/Filter\s*(\/[A-Za-z0-9]+|\[[^\]]*\])/);
        filter = fm ? fm[1] : '';
        if (es >= 0) re.lastIndex = es + 9;                 // skip binary body so it can't spawn false objects
      } else dictStr = whole.slice(objStart, boundary);
      objs[num] = { num: num, dictStr: dictStr, hasStream: hasStream, dataStart: dataStart, dataEnd: dataEnd, filter: filter };
    }
    return objs;
  }

  // Value of /Key that is a dict: inline `<< … >>` (balanced) or an indirect `N 0 R` resolved via objs. Returns the dict string or null.
  function dictAfter(str, key, objs) {
    const m = new RegExp('\\/' + key + '\\s*').exec(str);
    if (!m) return null;
    let i = m.index + m[0].length;
    while (i < str.length && isWS(str[i])) i++;
    if (str[i] === '<' && str[i + 1] === '<') {
      let depth = 1, j = i + 2;
      while (j < str.length && depth > 0) { if (str[j] === '<' && str[j + 1] === '<') { depth++; j += 2; } else if (str[j] === '>' && str[j + 1] === '>') { depth--; j += 2; } else j++; }
      return str.slice(i, j);
    }
    const rm = /^(\d+)\s+\d+\s+R/.exec(str.slice(i));
    if (rm && objs) { const o = objs[parseInt(rm[1], 10)]; if (o) return o.dictStr; }
    return null;
  }

  // Map of XObject resource name -> object number, from a /Resources dict.
  function xobjectMap(resDict, objs) {
    const map = {};
    if (!resDict) return map;
    const xo = dictAfter(resDict, 'XObject', objs);
    if (!xo) return map;
    const re = /\/([A-Za-z0-9.\-_]+)\s+(\d+)\s+\d+\s+R/g; let m;
    while ((m = re.exec(xo))) map[m[1]] = parseInt(m[2], 10);
    return map;
  }

  // Map of ExtGState resource name -> object number OR inline dict string.
  function extGStateMap(resDict, objs) {
    const map = {};
    if (!resDict) return map;
    const eg = dictAfter(resDict, 'ExtGState', objs);
    if (!eg) return map;
    const refRe = /\/([A-Za-z0-9.\-_]+)\s+(\d+)\s+\d+\s+R/g; let m;
    while ((m = refRe.exec(eg))) map[m[1]] = parseInt(m[2], 10);
    const inlRe = /\/([A-Za-z0-9.\-_]+)\s*(<<[^>]*>>)/g;
    while ((m = inlRe.exec(eg))) if (map[m[1]] === undefined) map[m[1]] = m[2];
    return map;
  }

  // Decoded content string(s) a page's /Contents points to (single ref or array of refs).
  function pageContents(pg, objs, u8) {
    const out = [];
    let refs = [];
    const arrM = pg.dictStr.match(/\/Contents\s*\[([^\]]*)\]/);
    if (arrM) { const rm = arrM[1].match(/(\d+)\s+\d+\s+R/g) || []; refs = rm.map(x => parseInt(x, 10)); }
    else { const r = pg.dictStr.match(/\/Contents\s+(\d+)\s+\d+\s+R/); if (r) refs = [parseInt(r[1], 10)]; }
    for (const rn of refs) { const c = getStreamContent(objs[rn], u8); if (c) out.push(c); }
    return out;
  }

  // /MediaBox from the page dict, inherited via /Parent if absent. [x0,y0,x1,y1].
  function pageMediaBox(pg, objs) {
    let dict = pg.dictStr, seen = new Set();
    for (let hops = 0; dict && hops < 32; hops++) {
      const m = dict.match(/\/MediaBox\s*\[\s*([-0-9.eE\s]+)\]/);
      if (m) {
        const nums = m[1].trim().split(/\s+/).map(parseFloat);
        if (nums.length === 4 && nums.every(v => isFinite(v))) {
          return [Math.min(nums[0], nums[2]), Math.min(nums[1], nums[3]),
                  Math.max(nums[0], nums[2]), Math.max(nums[1], nums[3])];
        }
      }
      const pm = dict.match(/\/Parent\s+(\d+)\s+\d+\s+R/);
      if (!pm || !objs) break;
      const pn = parseInt(pm[1], 10);
      if (seen.has(pn) || !objs[pn]) break;
      seen.add(pn);
      dict = objs[pn].dictStr;
    }
    return [0, 0, 612, 792];   // US letter default
  }

  // Fallback: filter-agnostic stream scan for PDFs whose page tree isn't reachable (e.g. pages in an ObjStm).
  function dictBefore(whole, si) { return whole.slice(Math.max(0, si - 4000), si); }
  function heuristicScan(whole, u8, out, baseCTM, stats) {
    let idx = 0;
    for (;;) {
      const si = whole.indexOf('stream', idx);
      if (si < 0) break;
      if (whole.substr(si - 3, 3) === 'end') { idx = si + 6; continue; }
      let ds = si + 6; if (whole[ds] === '\r') ds++; if (whole[ds] === '\n') ds++;
      const ei = whole.indexOf('endstream', ds);
      if (ei < 0) { idx = si + 6; continue; }
      const dict = dictBefore(whole, si);
      let dend = ei; if (whole[dend - 1] === '\n') dend--; if (whole[dend - 1] === '\r') dend--;
      const lenM = dict && dict.match(/\/Length\s+(\d+)(?!\s+\d+\s+R)/g);
      if (lenM) { const L = parseInt(lenM[lenM.length - 1].replace(/\/Length\s+/, ''), 10); if (ds + L <= u8.length) dend = ds + L; }
      const filM = dict && dict.match(/\/Filter\s*(\/[A-Za-z0-9]+|\[[^\]]*\])/g);
      const filter = filM ? filM[filM.length - 1] : '';
      let content = null; const raw = u8.subarray(ds, dend);
      if (/FlateDecode/.test(filter)) { try { const inf = pdfInflate(raw); content = u8ToStr(inf, 0, inf.length); } catch (e) { content = null; } }
      else if (!filter) content = u8ToStr(raw, 0, raw.length);
      if (content && looksLikeContent(content)) { try { interpretContent(content, out, { baseCTM: baseCTM, stats: stats }); } catch (e) {} }
      idx = ei + 9;
    }
  }

  // Main entry: Uint8Array of a PDF (or PDF-compatible .ai) -> studio import result:
  // { shapes, artboard:{w,h}, pageCount, hasLiveText, textShows }. Shapes are in
  // artboard coordinates (points, y-down); only the first page's content is imported.
  function parsePDFDoc(u8, opts) {
    const whole = u8ToStr(u8, 0, u8.length);
    if (whole.indexOf('%PDF') < 0) throw new Error('not a PDF (or PDF-compatible .ai) file');
    const objs = scanObjects(whole, u8);
    const stats = { text: 0 };
    const pages = [];
    for (const k in objs) { const o = objs[k]; if (/\/Type\s*\/Page\b/.test(o.dictStr) && !/\/Type\s*\/Pages\b/.test(o.dictStr)) pages.push(o); }
    pages.sort((a, b) => a.num - b.num);
    const out = { shapes: [], artboard: { w: 612, h: 792 }, pageCount: pages.length, hasLiveText: false, textShows: 0 };
    if (pages.length) {
      const pg = pages[0];
      const mb = pageMediaBox(pg, objs);
      out.artboard = { w: mb[2] - mb[0], h: mb[3] - mb[1] };
      // PDF user space is y-up with the origin at MediaBox bottom-left; the studio
      // is y-down with the origin at artboard top-left. One base matrix does both.
      const baseCTM = [1, 0, 0, -1, -mb[0], mb[3]];
      const resDict = dictAfter(pg.dictStr, 'Resources', objs);
      for (const cs of pageContents(pg, objs, u8)) {
        try {
          interpretContent(cs, out, {
            objs: objs, u8: u8, baseCTM: baseCTM, resourcesDict: resDict,
            xobjMap: xobjectMap(resDict, objs), gsMap: extGStateMap(resDict, objs),
            seen: {}, stats: stats,
          });
        } catch (e) {}
      }
    }
    if (out.shapes.length === 0 && stats.text === 0) {
      heuristicScan(whole, u8, out, [1, 0, 0, -1, 0, out.artboard.h], stats);   // page tree unreachable -> best-effort scan
    }
    out.hasLiveText = stats.text > 0;
    out.textShows = stats.text;
    return out;
  }

  // ---------- flat vector-PDF export ----------

  function fmtNum(v) {
    if (!isFinite(v)) v = 0;
    const s = (Math.round(v * 10000) / 10000).toString();
    return s.indexOf('e') >= 0 ? v.toFixed(4) : s;   // no exponent notation in PDF
  }
  function hexToRgb01(hex) {
    let h = /^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.exec(String(hex || ''));
    if (!h) return [0, 0, 0];
    h = h[1];
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    return [parseInt(h.slice(0, 2), 16) / 255, parseInt(h.slice(2, 4), 16) / 255, parseInt(h.slice(4, 6), 16) / 255];
  }
  function colorOp(hex, op) {
    const c = hexToRgb01(hex);
    return fmtNum(c[0]) + ' ' + fmtNum(c[1]) + ' ' + fmtNum(c[2]) + ' ' + op;
  }

  // Content-stream fragment for one shape, y flipped back to PDF's y-up space.
  function shapeContent(s, abH, gsName) {
    const parts = ['q'];
    if (gsName) parts.push('/' + gsName + ' gs');
    if (s.fill) parts.push(colorOp(s.fill, 'rg'));
    if (s.stroke) {
      parts.push(colorOp(s.stroke.color, 'RG'));
      parts.push(fmtNum(Math.max(s.stroke.w, 0)) + ' w');
    }
    for (const c of s.cmds) {
      if (c[0] === 'M') parts.push(fmtNum(c[1]) + ' ' + fmtNum(abH - c[2]) + ' m');
      else if (c[0] === 'L') parts.push(fmtNum(c[1]) + ' ' + fmtNum(abH - c[2]) + ' l');
      else if (c[0] === 'C') parts.push(
        fmtNum(c[1]) + ' ' + fmtNum(abH - c[2]) + ' ' + fmtNum(c[3]) + ' ' + fmtNum(abH - c[4]) + ' ' +
        fmtNum(c[5]) + ' ' + fmtNum(abH - c[6]) + ' c');
      else if (c[0] === 'Z') parts.push('h');
    }
    parts.push(s.fill && s.stroke ? 'B' : s.fill ? 'f' : 'S');
    parts.push('Q');
    return parts.join('\n');
  }

  // Build a complete single-page vector PDF of the document at artboard size.
  // Flat output: hidden layers are dropped, z-order is preserved, opacity < 1
  // becomes an /ExtGState. Returns a latin1 string (1 char = 1 byte);
  // use buildPDFBytes for a Uint8Array ready for a Blob.
  function buildPDF(doc) {
    const abW = doc.artboard.w, abH = doc.artboard.h;
    const hidden = new Set((doc.layers || []).filter(l => !l.visible).map(l => l.id));
    const shapes = (doc.shapes || []).filter(s => !hidden.has(s.layer) && (s.fill || s.stroke));

    // distinct sub-1 opacities -> /GS1..: value both as fill (ca) and stroke (CA) alpha
    const gsNames = new Map();   // rounded opacity -> name
    for (const s of shapes) {
      const o = Math.round(clamp01(s.opacity == null ? 1 : s.opacity) * 1000) / 1000;
      if (o < 1 && !gsNames.has(o)) gsNames.set(o, 'GS' + (gsNames.size + 1));
    }

    const frags = [];
    for (const s of shapes) {
      const o = Math.round(clamp01(s.opacity == null ? 1 : s.opacity) * 1000) / 1000;
      frags.push(shapeContent(s, abH, o < 1 ? gsNames.get(o) : null));
    }
    const content = frags.join('\n');

    let resources = '';
    if (gsNames.size) {
      const entries = [...gsNames.entries()].map(([o, name], idx) => '/' + name + ' ' + (5 + idx) + ' 0 R');
      resources = ' /Resources << /ExtGState << ' + entries.join(' ') + ' >> >>';
    }

    const objects = [];   // index 0 = object 1
    objects.push('<< /Type /Catalog /Pages 2 0 R >>');
    objects.push('<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
    objects.push('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + fmtNum(abW) + ' ' + fmtNum(abH) + ' ] /Contents 4 0 R' + resources + ' >>');
    objects.push('<< /Length ' + content.length + ' >>\nstream\n' + content + '\nendstream');
    for (const [o] of gsNames) objects.push('<< /Type /ExtGState /ca ' + fmtNum(o) + ' /CA ' + fmtNum(o) + ' >>');

    let pdf = '%PDF-1.4\n%âãÏÓ\n';   // binary marker comment
    const offsets = [];
    for (let i = 0; i < objects.length; i++) {
      offsets.push(pdf.length);
      pdf += (i + 1) + ' 0 obj\n' + objects[i] + '\nendobj\n';
    }
    const xrefPos = pdf.length;
    pdf += 'xref\n0 ' + (objects.length + 1) + '\n';
    pdf += '0000000000 65535 f \n';
    for (const off of offsets) pdf += String(off).padStart(10, '0') + ' 00000 n \n';
    pdf += 'trailer\n<< /Size ' + (objects.length + 1) + ' /Root 1 0 R >>\nstartxref\n' + xrefPos + '\n%%EOF\n';
    return pdf;
  }

  function buildPDFBytes(doc) { return strToU8(buildPDF(doc)); }

  return { parsePDFDoc, buildPDF, buildPDFBytes, pdfInflate };

if (typeof window !== 'undefined') window.VECPDF = VECPDF;

<script>
// studio_app — UI wiring for Aquamentor Vector Studio.
// Thin layer over VECCORE: canvas rendering, pan/zoom, tool state, panels.
(() => {
  'use strict';
  const C = window.VECCORE;
  const P = window.VECPDF;
  const $ = s => document.querySelector(s);

  const stagewrap = $('#stagewrap');
  const canvas = $('#stage');
  const ctx = canvas.getContext('2d');

  const TOOLS = {
    select: 'Selection', direct: 'Direct Selection', pen: 'Pen',
    rect: 'Rectangle', ellipse: 'Ellipse', hand: 'Hand', zoom: 'Zoom',
  };
  const TOOL_KEYS = { v: 'select', a: 'direct', p: 'pen', m: 'rect', l: 'ellipse', h: 'hand', z: 'zoom' };

  const AUTOSAVE_KEY = 'aqvec_autosave';

  function loadAutosave() {
    try {
      const s = localStorage.getItem(AUTOSAVE_KEY);
      return s ? C.parseDoc(s) : null;
    } catch (e) { return null; }
  }

  const state = {
    doc: loadAutosave() || C.demoDoc(),
    history: null,       // set at boot
    view: C.newView(),
    tool: 'select',
    space: false,        // spacebar temporary hand
    pan: null,           // {sx,sy,view0} while dragging
    drag: null,          // select-tool drag state machine
    sel: new Set(),      // selected shape ids (always group-expanded)
    autoFit: true,       // keep fitting on resize until the user changes the view
  };
  state.history = C.newHistory(state.doc);

  // ---------- selection helpers ----------
  function commitNow() {
    if (C.commit(state.history, state.doc)) scheduleAutosave();
  }
  function setSel(ids) {
    state.sel = new Set(C.expandIds(state.doc, ids));
  }
  function selShapes() {
    return state.doc.shapes.filter(s => state.sel.has(s.id));
  }
  function selectableLayers() {
    return new Set(state.doc.layers.filter(l => l.visible && !l.locked).map(l => l.id));
  }
  function worldPt(e) {
    const r = canvas.getBoundingClientRect();
    return C.s2w(state.view, e.clientX - r.left, e.clientY - r.top);
  }
  function screenPt(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }
  function hitAt(wx, wy) {
    const ok = selectableLayers();
    const tol = 3 / state.view.scale;
    for (let i = state.doc.shapes.length - 1; i >= 0; i--) {
      const s = state.doc.shapes[i];
      if (!ok.has(s.layer)) continue;
      if (C.hitTestShape(s, wx, wy, tol)) return s;
    }
    return null;
  }

  // bbox handle geometry (screen space)
  const HANDLE_FRAC = { nw: [0, 0], n: [.5, 0], ne: [1, 0], e: [1, .5], se: [1, 1], s: [.5, 1], sw: [0, 1], w: [0, .5] };
  const HANDLE_CURSOR = {
    nw: 'nwse-resize', se: 'nwse-resize', ne: 'nesw-resize', sw: 'nesw-resize',
    n: 'ns-resize', s: 'ns-resize', e: 'ew-resize', w: 'ew-resize',
  };
  function handlePoints(b) {
    const v = state.view;
    return Object.entries(HANDLE_FRAC).map(([c, f]) => {
      const p = C.w2s(v, b.x + f[0] * b.w, b.y + f[1] * b.h);
      return { c, x: p[0], y: p[1] };
    });
  }
  function hitHandle(sx, sy) {
    if (!state.sel.size) return null;
    const b = C.shapesBBox(selShapes());
    if (!b) return null;
    const pts = handlePoints(b);
    for (const h of pts) {
      if (Math.abs(sx - h.x) <= 5 && Math.abs(sy - h.y) <= 5) return { type: 'scale', c: h.c, bbox: b };
    }
    for (const h of pts) {
      if (h.c.length !== 2) continue; // corners only
      const d = Math.hypot(sx - h.x, sy - h.y);
      if (d > 5 && d <= 18) return { type: 'rotate', bbox: b };
    }
    return null;
  }

  function applyDragMatrix(m) {
    const byId = new Map(state.doc.shapes.map(s => [s.id, s]));
    for (const [id, cmds] of state.drag.orig) {
      const s = byId.get(id);
      if (s) s.cmds = C.transformCmds(cmds, m);
    }
  }
  function snapshotSel() {
    return new Map(selShapes().map(s => [s.id, JSON.parse(JSON.stringify(s.cmds))]));
  }

  // ---------- document lifecycle ----------
  let autosaveTimer = 0;
  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try { localStorage.setItem(AUTOSAVE_KEY, C.serializeDoc(state.doc)); } catch (e) { /* quota */ }
    }, 400);
  }

  // Route every doc mutation through here: history + autosave + repaint.
  function mutate(fn) {
    fn(state.doc);
    if (C.commit(state.history, state.doc)) scheduleAutosave();
    renderLayers();
    render();
  }

  function refreshDoc() {
    // drop selection ids that no longer exist in the current doc
    const alive = new Set(state.doc.shapes.map(s => s.id));
    state.sel = new Set([...state.sel].filter(id => alive.has(id)));
    renderLayers();
    render();
  }

  function doUndo() {
    const d = C.undo(state.history);
    if (d) { state.doc = d; scheduleAutosave(); refreshDoc(); }
  }
  function doRedo() {
    const d = C.redo(state.history);
    if (d) { state.doc = d; scheduleAutosave(); refreshDoc(); }
  }

  // New/Open replace the doc and reset history.
  function applyNewDoc(doc) {
    state.doc = doc;
    state.history = C.newHistory(doc);
    state.sel.clear();
    state.autoFit = true;
    scheduleAutosave();
    fitArtboard();
    refreshDoc();
  }

  function newFile() {
    if (state.doc.shapes.length && !window.confirm('Replace the current document with a new one?')) return;
    applyNewDoc(C.newDoc());
  }

  function saveFile() {
    const blob = new Blob([C.serializeDoc(state.doc)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (state.doc.name || 'Untitled') + '.aqv';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // ---------- import (.aqv project, vector .pdf/.ai) ----------
  function baseName(name) { return String(name || 'Untitled').replace(/\.(aqv|json|pdf|ai)$/i, ''); }

  function liveTextNote(res) {
    if (res.hasLiveText) {
      window.alert(res.textShows + ' live text object(s) were skipped — text isn’t imported as paths. ' +
        'Outline the fonts (Type > Create Outlines) before saving the PDF to bring text in as vectors.');
    }
  }

  // File > Open of a PDF/.ai: new document at the PDF page size, shapes as-is.
  function openPdfBytes(name, u8) {
    const res = P.parsePDFDoc(u8);
    const doc = C.newDoc({ units: 'in', w: res.artboard.w / 72, h: res.artboard.h / 72 });
    doc.name = baseName(name);
    for (const s of res.shapes) C.addShape(doc, s);
    applyNewDoc(doc);
    liveTextNote(res);
    if (!res.shapes.length && !res.hasLiveText) {
      window.alert('No vector paths found in "' + name + '". Images and unsupported filters are skipped.');
    }
    return res;
  }

  // Drag-drop of a PDF/.ai: place into the current document as a grouped selection.
  function placePdfBytes(name, u8) {
    const res = P.parsePDFDoc(u8);
    if (!res.shapes.length) {
      liveTextNote(res);
      if (!res.hasLiveText) window.alert('No vector paths found in "' + name + '".');
      return res;
    }
    let ids = [];
    mutate(d => {
      ids = res.shapes.map(s => C.addShape(d, JSON.parse(JSON.stringify(s))).id);
      if (ids.length >= 2) C.groupShapes(d, ids);
    });
    setSel(ids);
    render();
    liveTextNote(res);
    return res;
  }

  // Route one File (picker or drop) by content: %PDF -> vector import, else .aqv JSON.
  // `place` merges into the current doc instead of replacing it.
  function openFileObject(f, place) {
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const u8 = new Uint8Array(rd.result);
        const head = String.fromCharCode.apply(null, u8.subarray(0, Math.min(1024, u8.length)));
        if (head.indexOf('%PDF') >= 0 || /\.(pdf|ai)$/i.test(f.name)) {
          place ? placePdfBytes(f.name, u8) : openPdfBytes(f.name, u8);
        } else {
          const doc = C.parseDoc(new TextDecoder().decode(u8));
          doc.name = baseName(f.name);
          applyNewDoc(doc);
        }
      } catch (err) {
        window.alert('Could not open "' + f.name + '": ' + err.message);
      }
    };
    rd.readAsArrayBuffer(f);
  }

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.aqv,.json,.pdf,.ai,application/json,application/pdf';
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    fileInput.value = '';
    if (f) openFileObject(f, false);
  });
  function openFile() { fileInput.click(); }

  // Drop anywhere on the canvas: .pdf/.ai place into the doc, .aqv opens as a doc.
  stagewrap.addEventListener('dragover', e => { e.preventDefault(); });
  stagewrap.addEventListener('drop', e => {
    e.preventDefault();
    for (const f of e.dataTransfer.files) {
      openFileObject(f, /\.(pdf|ai)$/i.test(f.name));
    }
  });

  // ---------- export (flat vector PDF at artboard size) ----------
  function exportPDF() {
    const blob = new Blob([P.buildPDFBytes(state.doc)], { type: 'application/pdf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (state.doc.name || 'Untitled') + '.pdf';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // ---------- rendering ----------
  let dpr = 1, vw = 0, vh = 0;

  function resize() {
    const r = stagewrap.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    vw = r.width; vh = r.height;
    if (vw < 10 || vh < 10) return; // pane not laid out yet — wait for a real size
    canvas.width = Math.round(vw * dpr);
    canvas.height = Math.round(vh * dpr);
    if (state.autoFit) fitArtboard();
    render();
  }

  function fitArtboard() {
    const ab = state.doc.artboard;
    state.view = C.fitRect(vw, vh, 0, 0, ab.w, ab.h, 48);
  }

  function drawPath(cmds) {
    ctx.beginPath();
    for (const c of cmds) {
      if (c[0] === 'M') ctx.moveTo(c[1], c[2]);
      else if (c[0] === 'L') ctx.lineTo(c[1], c[2]);
      else if (c[0] === 'C') ctx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
      else if (c[0] === 'Z') ctx.closePath();
    }
  }

  function render() {
    const v = state.view, ab = state.doc.artboard;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--canvas') || '#1b1b1b';
    ctx.fillRect(0, 0, vw, vh);

    // artboard (screen space, so the shadow stays crisp at any zoom)
    const [ax, ay] = C.w2s(v, 0, 0);
    const aw = ab.w * v.scale, ah = ab.h * v.scale;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.55)';
    ctx.shadowBlur = 18; ctx.shadowOffsetY = 4;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(ax, ay, aw, ah);
    ctx.restore();

    // shapes (world space; strokes are world-width so they scale with zoom)
    ctx.save();
    ctx.beginPath(); ctx.rect(ax, ay, aw, ah); ctx.clip(); // clip to artboard like Ai preview
    ctx.setTransform(dpr * v.scale, 0, 0, dpr * v.scale, dpr * v.tx, dpr * v.ty);
    const hidden = new Set(state.doc.layers.filter(l => !l.visible).map(l => l.id));
    for (const s of state.doc.shapes) {
      if (hidden.has(s.layer)) continue;
      ctx.globalAlpha = s.opacity != null ? s.opacity : 1;
      drawPath(s.cmds);
      if (s.fill) { ctx.fillStyle = s.fill; ctx.fill(); }
      if (s.stroke) { ctx.strokeStyle = s.stroke.color; ctx.lineWidth = s.stroke.w; ctx.stroke(); }
    }
    ctx.restore();

    // artboard outline on top
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(ax + .5, ay + .5, aw, ah);

    drawSelectionOverlay();
    updateReadouts();
  }

  function drawSelectionOverlay() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state.sel.size) {
      const b = C.shapesBBox(selShapes());
      if (b) {
        const p0 = C.w2s(state.view, b.x, b.y);
        const p1 = C.w2s(state.view, b.x + b.w, b.y + b.h);
        const units = C.selectionUnits(state.doc, [...state.sel]);
        if (units.length > 1) {
          ctx.strokeStyle = 'rgba(58,142,230,.45)';
          ctx.lineWidth = 1;
          for (const u of units) {
            const q0 = C.w2s(state.view, u.bbox.x, u.bbox.y);
            const q1 = C.w2s(state.view, u.bbox.x + u.bbox.w, u.bbox.y + u.bbox.h);
            ctx.strokeRect(q0[0] + .5, q0[1] + .5, q1[0] - q0[0], q1[1] - q0[1]);
          }
        }
        ctx.strokeStyle = '#3a8ee6';
        ctx.lineWidth = 1;
        ctx.strokeRect(p0[0] + .5, p0[1] + .5, p1[0] - p0[0], p1[1] - p0[1]);
        ctx.fillStyle = '#fff';
        for (const h of handlePoints(b)) {
          ctx.fillRect(h.x - 3.5, h.y - 3.5, 7, 7);
          ctx.strokeRect(h.x - 3 + .5, h.y - 3 + .5, 6, 6);
        }
      }
    }
    const d = state.drag;
    if (d && d.kind === 'marquee' && d.moved) {
      ctx.strokeStyle = '#3a8ee6';
      ctx.fillStyle = 'rgba(58,142,230,.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      const x = Math.min(d.m0[0], d.m1[0]), y = Math.min(d.m0[1], d.m1[1]);
      const w = Math.abs(d.m1[0] - d.m0[0]), hh = Math.abs(d.m1[1] - d.m0[1]);
      ctx.fillRect(x, y, w, hh);
      ctx.strokeRect(x + .5, y + .5, w, hh);
      ctx.setLineDash([]);
    }
  }

  // ---------- panels / readouts ----------
  function updateReadouts() {
    const ab = state.doc.artboard, k = C.PT_PER[state.doc.units];
    $('#p-name').textContent = state.doc.name || 'Untitled';
    $('#p-artboard').textContent = `${+(ab.w / k).toFixed(2)} × ${+(ab.h / k).toFixed(2)} ${state.doc.units}`;
    const z = Math.round(C.zoomPct(state.view)) + '%';
    $('#p-zoom').textContent = z;
    $('#s-zoom').textContent = z;
    $('#p-tool').textContent = TOOLS[state.tool];
    $('#s-tool').textContent = TOOLS[state.tool];
    // selection readout + align button state
    const selEl = $('#p-sel');
    if (state.sel.size) {
      const b = C.shapesBBox(selShapes());
      selEl.textContent = b
        ? `${state.sel.size} obj · ${+(b.w / k).toFixed(2)} × ${+(b.h / k).toFixed(2)} ${state.doc.units}`
        : `${state.sel.size} obj`;
    } else {
      selEl.textContent = '—';
    }
    const units = selUnitCount();
    document.querySelectorAll('.alignrow button[data-align]').forEach(btn => {
      const dist = btn.dataset.align === 'hdist' || btn.dataset.align === 'vdist';
      btn.disabled = dist ? units < 3 : units < 2;
    });
  }

  function renderLayers() {
    const ul = $('#layerlist');
    ul.innerHTML = '';
    for (const l of state.doc.layers) {
      const li = document.createElement('li');
      const eye = document.createElement('span');
      eye.className = 'eye' + (l.visible ? ' on' : '');
      eye.textContent = l.visible ? '◉' : '○';
      eye.title = 'Toggle visibility';
      eye.addEventListener('click', () => mutate(d => {
        const dl = d.layers.find(x => x.id === l.id);
        if (dl) dl.visible = !dl.visible;
      }));
      const name = document.createElement('span');
      name.className = 'lname';
      name.textContent = l.name;
      li.append(eye, name);
      ul.appendChild(li);
    }
  }

  // ---------- menus ----------
  const MENUS = {
    file: [
      { label: 'New', run: newFile },
      { label: 'Open…', kbd: '⌘O', run: openFile },
      { label: 'Save', kbd: '⌘S', run: saveFile },
      { label: 'Export PDF…', kbd: '⌘E', run: exportPDF, enabled: () => state.doc.shapes.length > 0 },
    ],
    edit: [
      { label: 'Undo', kbd: '⌘Z', run: doUndo, enabled: () => C.canUndo(state.history) },
      { label: 'Redo', kbd: '⇧⌘Z', run: doRedo, enabled: () => C.canRedo(state.history) },
      { label: 'Select All', kbd: '⌘A', run: () => selectAll(), enabled: () => state.doc.shapes.length > 0 },
    ],
    object: [
      { label: 'Group', kbd: '⌘G', run: () => doGroup(), enabled: () => selUnitCount() >= 2 },
      { label: 'Ungroup', kbd: '⇧⌘G', run: () => doUngroup(), enabled: () => selHasGroup() },
      { label: 'Bring to Front', kbd: '⇧⌘]', run: () => doArrange('front'), enabled: () => state.sel.size > 0 },
      { label: 'Bring Forward', kbd: '⌘]', run: () => doArrange('forward'), enabled: () => state.sel.size > 0 },
      { label: 'Send Backward', kbd: '⌘[', run: () => doArrange('backward'), enabled: () => state.sel.size > 0 },
      { label: 'Send to Back', kbd: '⇧⌘[', run: () => doArrange('back'), enabled: () => state.sel.size > 0 },
    ],
  };

  // ---------- selection commands ----------
  function selUnitCount() {
    return state.sel.size ? C.selectionUnits(state.doc, [...state.sel]).length : 0;
  }
  function selHasGroup() {
    return selShapes().some(s => s.group);
  }
  function selectAll() {
    const ok = selectableLayers();
    setSel(state.doc.shapes.filter(s => ok.has(s.layer)).map(s => s.id));
    render();
  }
  function doGroup() {
    if (selUnitCount() < 2) return;
    mutate(d => C.groupShapes(d, [...state.sel]));
  }
  function doUngroup() {
    if (!selHasGroup()) return;
    mutate(d => {
      const roots = new Set(
        d.shapes.filter(s => state.sel.has(s.id)).map(s => C.rootGroupOf(d, s)).filter(Boolean));
      roots.forEach(gid => C.ungroupShapes(d, gid));
    });
  }
  function doArrange(how) {
    if (!state.sel.size) return;
    mutate(d => {
      const ids = [...state.sel];
      if (how === 'front') C.bringToFront(d, ids);
      else if (how === 'forward') C.bringForward(d, ids);
      else if (how === 'backward') C.sendBackward(d, ids);
      else C.sendToBack(d, ids);
    });
  }
  function doDelete() {
    if (!state.sel.size) return;
    mutate(d => { d.shapes = d.shapes.filter(s => !state.sel.has(s.id)); });
    state.sel.clear();
    render();
  }
  function nudge(dx, dy) {
    if (!state.sel.size) return;
    const m = C.mTranslate(dx, dy);
    mutate(d => {
      for (const s of d.shapes) if (state.sel.has(s.id)) s.cmds = C.transformCmds(s.cmds, m);
    });
  }

  document.querySelectorAll('.alignrow button[data-align]').forEach(b =>
    b.addEventListener('click', () => {
      if (b.disabled) return;
      mutate(d => C.alignUnits(d, [...state.sel], b.dataset.align));
    }));

  let openMenu = null; // {el, dd}
  function closeMenu() {
    if (!openMenu) return;
    openMenu.el.classList.remove('open');
    openMenu.dd.remove();
    openMenu = null;
  }
  function showMenu(el) {
    closeMenu();
    const items = MENUS[el.dataset.menu];
    if (!items) return;
    const dd = document.createElement('div');
    dd.className = 'dropdown';
    for (const it of items) {
      const div = document.createElement('div');
      const on = !it.enabled || it.enabled();
      div.className = 'item' + (on ? '' : ' disabled');
      div.innerHTML = '<span></span><span class="kbd"></span>';
      div.firstChild.textContent = it.label;
      div.lastChild.textContent = it.kbd || '';
      if (on) div.addEventListener('click', () => { closeMenu(); it.run(); });
      dd.appendChild(div);
    }
    const r = el.getBoundingClientRect();
    dd.style.left = r.left + 'px';
    dd.style.top = r.bottom + 2 + 'px';
    document.body.appendChild(dd);
    el.classList.add('open');
    openMenu = { el, dd };
  }
  document.querySelectorAll('#menubar .menu[data-menu]').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      openMenu && openMenu.el === el ? closeMenu() : showMenu(el);
    }));
  window.addEventListener('pointerdown', e => {
    if (openMenu && !openMenu.dd.contains(e.target) && !openMenu.el.contains(e.target)) closeMenu();
  });

  // ---------- tools ----------
  function setTool(t) {
    if (!TOOLS[t]) return;
    state.tool = t;
    document.querySelectorAll('#toolbar button[data-tool]').forEach(b =>
      b.classList.toggle('active', b.dataset.tool === t));
    stagewrap.className = 'tool-' + t;
    updateReadouts();
  }

  document.querySelectorAll('#toolbar button[data-tool]').forEach(b =>
    b.addEventListener('click', () => setTool(b.dataset.tool)));

  // ---------- pointer: pan / zoom-click ----------
  function panActive(e) {
    return state.tool === 'hand' || state.space || e.button === 1;
  }

  canvas.addEventListener('pointerdown', e => {
    if (panActive(e)) {
      state.autoFit = false;
      state.pan = { sx: e.clientX, sy: e.clientY, view0: { ...state.view } };
      stagewrap.classList.add('panning');
      canvas.setPointerCapture(e.pointerId);
      e.preventDefault();
      return;
    }
    if (state.tool === 'zoom') {
      state.autoFit = false;
      const r = canvas.getBoundingClientRect();
      const f = e.altKey ? 1 / 1.5 : 1.5;
      state.view = C.zoomAt(state.view, e.clientX - r.left, e.clientY - r.top, f);
      render();
      return;
    }
    if (state.tool !== 'select' || e.button !== 0) return;

    const [sx, sy] = screenPt(e);
    const [wx, wy] = worldPt(e);
    canvas.setPointerCapture(e.pointerId);

    // 1) bbox handles beat shape hits
    const h = hitHandle(sx, sy);
    if (h) {
      const b = h.bbox;
      if (h.type === 'scale') {
        const f = HANDLE_FRAC[h.c];
        let ax = b.x + (1 - f[0]) * b.w, ay = b.y + (1 - f[1]) * b.h; // opposite point
        if (e.altKey) { ax = b.x + b.w / 2; ay = b.y + b.h / 2; }
        state.drag = {
          kind: 'scale', c: h.c, ax, ay,
          hx: b.x + f[0] * b.w, hy: b.y + f[1] * b.h,
          axis: h.c === 'n' || h.c === 's' ? 'y' : h.c === 'e' || h.c === 'w' ? 'x' : 'xy',
          orig: snapshotSel(), moved: false,
        };
      } else {
        const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        state.drag = {
          kind: 'rotate', cx, cy,
          a0: Math.atan2(wy - cy, wx - cx),
          orig: snapshotSel(), moved: false,
        };
      }
      return;
    }

    // 2) shape hit → select / toggle, arm move drag
    const hit = hitAt(wx, wy);
    if (hit) {
      if (e.shiftKey) {
        const unit = C.expandIds(state.doc, [hit.id]);
        if (state.sel.has(hit.id)) {
          unit.forEach(id => state.sel.delete(id));
          render();
          return; // deselected — no drag
        }
        unit.forEach(id => state.sel.add(id));
      } else if (!state.sel.has(hit.id)) {
        setSel([hit.id]);
      }
      state.drag = {
        kind: 'move', wx0: wx, wy0: wy,
        alt: e.altKey, dupDone: false,
        orig: snapshotSel(), moved: false,
      };
      render();
      return;
    }

    // 3) empty space → marquee
    state.drag = { kind: 'marquee', m0: [sx, sy], m1: [sx, sy], shift: e.shiftKey, moved: false };
  });

  canvas.addEventListener('pointermove', e => {
    if (state.pan) {
      state.view = C.panBy(state.pan.view0, e.clientX - state.pan.sx, e.clientY - state.pan.sy);
      render();
    }
    const [sx, sy] = screenPt(e);
    const [wx, wy] = worldPt(e);
    const d = state.drag;
    if (d) {
      if (d.kind === 'move') {
        const dx = wx - d.wx0, dy = wy - d.wy0;
        if (!d.moved && Math.hypot(dx, dy) * state.view.scale < 3) { /* click slack */ }
        else {
          if (d.alt && !d.dupDone) { // alt-drag: copy moves, original stays
            const ids = C.duplicateShapes(state.doc, [...state.sel]);
            setSel(ids);
            d.orig = snapshotSel();
            d.dupDone = true;
          }
          d.moved = true;
          applyDragMatrix(C.mTranslate(dx, dy));
          render();
        }
      } else if (d.kind === 'scale') {
        let fx = 1, fy = 1;
        const dx0 = d.hx - d.ax, dy0 = d.hy - d.ay;
        if (d.axis !== 'y' && Math.abs(dx0) > 1e-9) fx = (wx - d.ax) / dx0;
        if (d.axis !== 'x' && Math.abs(dy0) > 1e-9) fy = (wy - d.ay) / dy0;
        if (e.shiftKey && d.axis === 'xy') fy = fx;
        if (isFinite(fx) && isFinite(fy)) {
          d.moved = true;
          applyDragMatrix(C.mScale(fx, fy, d.ax, d.ay));
          render();
        }
      } else if (d.kind === 'rotate') {
        let da = Math.atan2(wy - d.cy, wx - d.cx) - d.a0;
        if (e.shiftKey) da = Math.round(da / (Math.PI / 4)) * (Math.PI / 4);
        d.moved = true;
        applyDragMatrix(C.mRotate(da, d.cx, d.cy));
        render();
      } else if (d.kind === 'marquee') {
        d.m1 = [sx, sy];
        d.moved = true;
        render();
      }
    } else if (state.tool === 'select' && !state.pan) {
      const hh = hitHandle(sx, sy);
      canvas.style.cursor = hh ? (hh.type === 'rotate' ? 'crosshair' : HANDLE_CURSOR[hh.c]) : '';
    }
    const k = C.PT_PER[state.doc.units];
    $('#s-coords').textContent = `x: ${(wx / k).toFixed(2)} ${state.doc.units}   y: ${(wy / k).toFixed(2)} ${state.doc.units}`;
  });

  canvas.addEventListener('pointerup', e => {
    if (state.pan) {
      state.pan = null;
      stagewrap.classList.remove('panning');
      canvas.releasePointerCapture(e.pointerId);
      return;
    }
    const d = state.drag;
    if (!d) return;
    state.drag = null;
    if (d.kind === 'marquee') {
      if (!d.moved) {
        if (!d.shift) { state.sel.clear(); render(); }
        return;
      }
      const v = state.view;
      const [ax, ay] = C.s2w(v, Math.min(d.m0[0], d.m1[0]), Math.min(d.m0[1], d.m1[1]));
      const [bx, by] = C.s2w(v, Math.max(d.m0[0], d.m1[0]), Math.max(d.m0[1], d.m1[1]));
      const rect = { x: ax, y: ay, w: bx - ax, h: by - ay };
      const ok = selectableLayers();
      const ids = state.doc.shapes
        .filter(s => ok.has(s.layer))
        .filter(s => { const b = C.tightBBox(s.cmds); return b && C.rectsIntersect(b, rect); })
        .map(s => s.id);
      setSel(d.shift ? [...state.sel, ...ids] : ids);
      render();
    } else if (d.moved) {
      commitNow();
      render();
    }
  });

  // wheel = zoom at cursor (trackpad pinch arrives as ctrl+wheel — same path)
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    state.autoFit = false;
    const r = canvas.getBoundingClientRect();
    const f = Math.exp(-e.deltaY * (e.ctrlKey ? 0.01 : 0.0015));
    state.view = C.zoomAt(state.view, e.clientX - r.left, e.clientY - r.top, f);
    render();
  }, { passive: false });

  // ---------- keyboard ----------
  window.addEventListener('keydown', e => {
    const mod = e.metaKey || e.ctrlKey;
    const k = e.key.toLowerCase();
    if (e.key === 'Escape') {
      closeMenu();
      if (state.sel.size) { state.sel.clear(); render(); }
      return;
    }
    if (mod && (k === 'y' || (e.shiftKey && k === 'z'))) { doRedo(); e.preventDefault(); return; }
    if (mod && k === 'z') { doUndo(); e.preventDefault(); return; }
    if (mod && k === 's') { saveFile(); e.preventDefault(); return; }
    if (mod && k === 'o') { openFile(); e.preventDefault(); return; }
    if (mod && k === 'e') { exportPDF(); e.preventDefault(); return; }
    if (mod && k === 'a') { selectAll(); e.preventDefault(); return; }
    if (mod && k === 'g') { e.shiftKey ? doUngroup() : doGroup(); e.preventDefault(); return; }
    if (mod && e.key === ']') { doArrange(e.shiftKey ? 'front' : 'forward'); e.preventDefault(); return; }
    if (mod && e.key === '[') { doArrange(e.shiftKey ? 'back' : 'backward'); e.preventDefault(); return; }
    if (!mod && (e.key === 'Delete' || e.key === 'Backspace')) { doDelete(); e.preventDefault(); return; }
    if (!mod && e.key.startsWith('Arrow') && state.sel.size) {
      const step = e.shiftKey ? 10 : 1;
      nudge(
        e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0,
        e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0);
      e.preventDefault();
      return;
    }
    if (e.code === 'Space' && !e.repeat) {
      state.space = true;
      stagewrap.classList.add('tool-hand');
      e.preventDefault();
      return;
    }
    if (mod && e.key === '0') { state.autoFit = true; fitArtboard(); render(); e.preventDefault(); return; }
    if (mod && e.key === '1') {
      state.autoFit = false;
      state.view = C.zoomAt(state.view, vw / 2, vh / 2, C.PX_PER_PT_100 / state.view.scale);
      render(); e.preventDefault(); return;
    }
    if (mod && (e.key === '=' || e.key === '+')) {
      state.autoFit = false;
      state.view = C.zoomAt(state.view, vw / 2, vh / 2, 1.25); render(); e.preventDefault(); return;
    }
    if (mod && e.key === '-') {
      state.autoFit = false;
      state.view = C.zoomAt(state.view, vw / 2, vh / 2, 1 / 1.25); render(); e.preventDefault(); return;
    }
    if (!mod && TOOL_KEYS[e.key.toLowerCase()]) setTool(TOOL_KEYS[e.key.toLowerCase()]);
  });

  window.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      state.space = false;
      if (state.tool !== 'hand') stagewrap.className = 'tool-' + state.tool;
    }
  });

  $('#btn-fit').addEventListener('click', () => { state.autoFit = true; fitArtboard(); render(); });
  $('#btn-100').addEventListener('click', () => {
    state.autoFit = false;
    state.view = C.zoomAt(state.view, vw / 2, vh / 2, C.PX_PER_PT_100 / state.view.scale);
    render();
  });

  // ---------- boot ----------
  window.addEventListener('resize', resize);
  new ResizeObserver(resize).observe(stagewrap);
  setTool('select');
  renderLayers();
  resize();

  // debug handle
  window.VEC_STUDIO = {
    state, render, setTool, fitArtboard, VECCORE: C, VECPDF: P,
    mutate, doUndo, doRedo, newFile, openFile, saveFile, applyNewDoc,
    openPdfBytes, placePdfBytes, exportPDF,
    setSel, selectAll, doGroup, doUngroup, doArrange, doDelete, nudge,
  };
})();

</script>
</body>
</html>
