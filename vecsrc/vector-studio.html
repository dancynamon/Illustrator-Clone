<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquamentor Vector Studio</title>
<style>
  :root {
    --bg: #323232;          /* app chrome */
    --panel: #2a2a2b;       /* panel bodies */
    --panel-head: #383838;  /* panel section headers */
    --edge: #1f1f1f;        /* borders between chrome regions */
    --canvas: #1b1b1b;      /* pasteboard behind artboard */
    --text: #d6d6d6;
    --text-dim: #9a9a9a;
    --accent: #3a8ee6;      /* selection / active-tool blue */
    --tool: #b8b8b8;        /* toolbar icon color */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 12px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: grid;
    grid-template-rows: 28px 1fr 22px;
    grid-template-columns: 40px 1fr 240px;
    grid-template-areas:
      "menu menu menu"
      "tools stage panels"
      "status status status";
    user-select: none; -webkit-user-select: none;
  }

  /* ---- menu bar ---- */
  #menubar {
    grid-area: menu; display: flex; align-items: center;
    background: var(--bg); border-bottom: 1px solid var(--edge);
    padding: 0 10px; gap: 2px;
  }
  #menubar .brand {
    font-weight: 600; color: var(--text); margin-right: 14px;
    letter-spacing: .2px;
  }
  #menubar .brand span { color: var(--accent); }
  #menubar .menu {
    padding: 3px 9px; border-radius: 3px; color: var(--text-dim); cursor: default;
  }
  #menubar .menu:hover, #menubar .menu.open { background: #3f3f40; color: var(--text); }

  /* ---- dropdown menus ---- */
  .dropdown {
    position: fixed; min-width: 180px; z-index: 100;
    background: #2f2f30; border: 1px solid #1a1a1a; border-radius: 4px;
    padding: 4px; box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  .dropdown .item {
    display: flex; justify-content: space-between; gap: 24px;
    padding: 5px 10px; border-radius: 3px; color: var(--text); cursor: default;
  }
  .dropdown .item:hover:not(.disabled) { background: var(--accent); color: #fff; }
  .dropdown .item.disabled { color: #6a6a6a; }
  .dropdown .kbd { color: var(--text-dim); }
  .dropdown .item:hover:not(.disabled) .kbd { color: #dbe9ff; }

  /* ---- left toolbar ---- */
  #toolbar {
    grid-area: tools; background: var(--bg); border-right: 1px solid var(--edge);
    display: flex; flex-direction: column; align-items: center; padding-top: 6px; gap: 2px;
  }
  #toolbar button {
    width: 32px; height: 30px; border: 0; border-radius: 4px;
    background: transparent; color: var(--tool); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #toolbar button:hover { background: #3f3f40; color: #fff; }
  #toolbar button.active { background: var(--accent); color: #fff; }
  #toolbar .sep { width: 22px; height: 1px; background: var(--edge); margin: 4px 0; }
  #toolbar svg { width: 17px; height: 17px; display: block; }

  /* ---- stage ---- */
  #stagewrap { grid-area: stage; position: relative; background: var(--canvas); overflow: hidden; }
  #stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #stagewrap.tool-hand #stage { cursor: grab; }
  #stagewrap.tool-hand.panning #stage { cursor: grabbing; }
  #stagewrap.tool-zoom #stage { cursor: zoom-in; }

  /* ---- right panels ---- */
  #panels {
    grid-area: panels; background: var(--panel); border-left: 1px solid var(--edge);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .panel { border-bottom: 1px solid var(--edge); }
  .panel > h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim); background: var(--panel-head);
    padding: 5px 10px; cursor: default;
  }
  .panel .body { padding: 8px 10px; }
  .prow { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
  .prow .k { color: var(--text-dim); }
  .prow .v { color: var(--text); font-variant-numeric: tabular-nums; }
  .pbtns { display: flex; gap: 6px; margin-top: 6px; }
  .pbtns button {
    flex: 1; padding: 4px 0; border: 1px solid #4a4a4a; border-radius: 3px;
    background: #3a3a3b; color: var(--text); cursor: pointer; font-size: 11px;
  }
  .pbtns button:hover { background: #454546; }

  /* align panel */
  .alignrow { display: flex; gap: 4px; margin-bottom: 4px; }
  .alignrow button {
    width: 30px; height: 26px; border: 1px solid #4a4a4a; border-radius: 3px;
    background: #3a3a3b; color: var(--tool); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .alignrow button:hover:not([disabled]) { background: #454546; color: #fff; }
  .alignrow button[disabled] { opacity: .35; cursor: default; }
  .alignrow svg { width: 15px; height: 15px; }

  /* layers list */
  #layerlist { list-style: none; }
  #layerlist li {
    display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 3px;
  }
  #layerlist li:hover { background: #343435; }
  #layerlist .eye { cursor: pointer; width: 16px; text-align: center; color: var(--text-dim); }
  #layerlist .eye.on { color: var(--text); }
  #layerlist .lname { flex: 1; }

  /* ---- status bar ---- */
  #statusbar {
    grid-area: status; display: flex; align-items: center; gap: 18px;
    background: var(--bg); border-top: 1px solid var(--edge);
    padding: 0 12px; color: var(--text-dim); font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  #statusbar .right { margin-left: auto; display: flex; gap: 18px; }
</style>
</head>
<body>

<div id="menubar">
  <div class="brand">AQ<span>Vector</span></div>
  <div class="menu" data-menu="file">File</div>
  <div class="menu" data-menu="edit">Edit</div>
  <div class="menu" data-menu="object">Object</div>
  <div class="menu">View</div>
  <div class="menu">Window</div>
</div>

<div id="toolbar">
  <button data-tool="select" title="Selection (V)">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M6 2 L6 16 L9.6 12.6 L12 18 L14.2 17 L11.8 11.8 L16.5 11.5 Z"/></svg>
  </button>
  <button data-tool="direct" title="Direct Selection (A)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 2.8 L6 15 L9.4 11.9 L11.8 16.8 L13.7 15.9 L11.5 11.2 L15.6 10.9 Z"/></svg>
  </button>
  <div class="sep"></div>
  <button data-tool="pen" title="Pen (P)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 2 L13 9 L10 13 L7 9 Z"/><path d="M10 13 L10 17"/><circle cx="10" cy="10" r="1" fill="currentColor" stroke="none"/></svg>
  </button>
  <button data-tool="rect" title="Rectangle (M)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="5" width="13" height="10"/></svg>
  </button>
  <button data-tool="ellipse" title="Ellipse (L)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><ellipse cx="10" cy="10" rx="6.5" ry="5"/></svg>
  </button>
  <div class="sep"></div>
  <button data-tool="hand" title="Hand (H) — or hold Space">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 10.5 V4.8 a1.2 1.2 0 0 1 2.4 0 V9 M9.4 9 V3.8 a1.2 1.2 0 0 1 2.4 0 V9 M11.8 9 V4.8 a1.2 1.2 0 0 1 2.4 0 V11.5 c0 3-1.8 5.5-4.6 5.5 c-2.4 0-3.6-1.2-4.8-3.6 L3.4 11.6 a1.15 1.15 0 0 1 2-1.1 L7 12.5"/></svg>
  </button>
  <button data-tool="zoom" title="Zoom (Z) — click in, Alt-click out">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="9" cy="9" r="5.5"/><path d="M13.2 13.2 L17 17"/><path d="M6.5 9 H11.5 M9 6.5 V11.5"/></svg>
  </button>
</div>

<div id="stagewrap">
  <canvas id="stage"></canvas>
</div>

<div id="panels">
  <div class="panel">
    <h2>Properties</h2>
    <div class="body">
      <div class="prow"><span class="k">Document</span><span class="v" id="p-name">—</span></div>
      <div class="prow"><span class="k">Artboard</span><span class="v" id="p-artboard">—</span></div>
      <div class="prow"><span class="k">Zoom</span><span class="v" id="p-zoom">—</span></div>
      <div class="prow"><span class="k">Tool</span><span class="v" id="p-tool">—</span></div>
      <div class="prow"><span class="k">Selection</span><span class="v" id="p-sel">—</span></div>
      <div class="pbtns">
        <button id="btn-fit" title="Cmd+0">Fit</button>
        <button id="btn-100" title="Cmd+1">100%</button>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>Align</h2>
    <div class="body">
      <div class="alignrow">
        <button data-align="left" title="Align left edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 2v12"/><rect x="5" y="3.5" width="8" height="3.2"/><rect x="5" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="hcenter" title="Align horizontal centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M8 2v12"/><rect x="4" y="3.5" width="8" height="3.2"/><rect x="5.5" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="right" title="Align right edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M13 2v12"/><rect x="3" y="3.5" width="8" height="3.2"/><rect x="6" y="9.3" width="5" height="3.2"/></svg>
        </button>
        <button data-align="hdist" title="Distribute horizontal centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 3v10M8 3v10M13 3v10"/></svg>
        </button>
      </div>
      <div class="alignrow">
        <button data-align="top" title="Align top edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3h12"/><rect x="3.5" y="5" width="3.2" height="8"/><rect x="9.3" y="5" width="3.2" height="5"/></svg>
        </button>
        <button data-align="vcenter" title="Align vertical centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 8h12"/><rect x="3.5" y="4" width="3.2" height="8"/><rect x="9.3" y="5.5" width="3.2" height="5"/></svg>
        </button>
        <button data-align="bottom" title="Align bottom edges">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 13h12"/><rect x="3.5" y="3" width="3.2" height="8"/><rect x="9.3" y="6" width="3.2" height="5"/></svg>
        </button>
        <button data-align="vdist" title="Distribute vertical centers">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 3h10M3 8h10M3 13h10"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>Layers</h2>
    <div class="body"><ul id="layerlist"></ul></div>
  </div>
</div>

<div id="statusbar">
  <span id="s-coords">x: — y: —</span>
  <div class="right">
    <span id="s-tool">Selection</span>
    <span id="s-zoom">100%</span>
  </div>
</div>

<script>
// VECCORE — pure document/geometry core for Aquamentor Vector Studio.
// No DOM. Document coordinates are PDF points (1/72 in), y-down like SVG;
// the PDF exporter flips y. Loaded in-browser via build concat and in node
// tests via require.
const VECCORE = (() => {
  'use strict';

  const PT_PER = { in: 72, mm: 72 / 25.4, pt: 1 };
  // 100% zoom = 96 CSS px per inch (screen convention), i.e. 96/72 px per pt.
  const PX_PER_PT_100 = 96 / 72;

  // ---------- document ----------
  function newDoc(o = {}) {
    const units = o.units || 'in';
    const k = PT_PER[units];
    return {
      name: o.name || 'Untitled',
      units,
      artboard: { w: (o.w != null ? o.w : 8.5) * k, h: (o.h != null ? o.h : 11) * k },
      layers: [{ id: 'L1', name: 'Layer 1', visible: true, locked: false }],
      shapes: [],
      groups: [],
      nextId: 1,
    };
  }

  function addShape(doc, shape) {
    shape.id = 'S' + doc.nextId++;
    if (!shape.layer) shape.layer = doc.layers[0].id;
    if (shape.fill === undefined) shape.fill = null;
    if (shape.stroke === undefined) shape.stroke = null;
    if (shape.opacity == null) shape.opacity = 1;
    if (shape.group === undefined) shape.group = null;
    doc.shapes.push(shape);
    return shape;
  }

  // ---------- view (world pt <-> screen px) ----------
  // screen = world*scale + t
  function newView() { return { scale: PX_PER_PT_100, tx: 0, ty: 0 }; }
  function w2s(v, x, y) { return [x * v.scale + v.tx, y * v.scale + v.ty]; }
  function s2w(v, x, y) { return [(x - v.tx) / v.scale, (y - v.ty) / v.scale]; }

  // Zoom by factor f keeping screen point (sx,sy) fixed on the same world point.
  function zoomAt(v, sx, sy, f, min = 0.02, max = 96) {
    const ns = Math.min(max, Math.max(min, v.scale * f));
    const wx = (sx - v.tx) / v.scale, wy = (sy - v.ty) / v.scale;
    return { scale: ns, tx: sx - wx * ns, ty: sy - wy * ns };
  }

  function panBy(v, dx, dy) { return { scale: v.scale, tx: v.tx + dx, ty: v.ty + dy }; }

  // View that fits world rect (x,y,w,h) centered in a vw×vh viewport.
  // Padding shrinks on small viewports; scale is always positive.
  function fitRect(vw, vh, x, y, w, h, pad = 40) {
    pad = Math.max(0, Math.min(pad, vw * 0.1, vh * 0.1));
    const s = Math.max(1e-6, Math.min((vw - 2 * pad) / w, (vh - 2 * pad) / h));
    return { scale: s, tx: (vw - w * s) / 2 - x * s, ty: (vh - h * s) / 2 - y * s };
  }

  function zoomPct(v) { return v.scale / PX_PER_PT_100 * 100; }

  // ---------- paths ----------
  // A path is an array of commands: ['M',x,y] ['L',x,y] ['C',x1,y1,x2,y2,x,y] ['Z'].
  // Maps 1:1 onto canvas, SVG, and PDF operators.

  const KAPPA = 0.5522847498307936; // cubic circle approximation constant

  function rectPath(x, y, w, h, r = 0) {
    if (r <= 0) return [['M', x, y], ['L', x + w, y], ['L', x + w, y + h], ['L', x, y + h], ['Z']];
    r = Math.min(r, w / 2, h / 2);
    const k = KAPPA * r;
    return [
      ['M', x + r, y],
      ['L', x + w - r, y], ['C', x + w - r + k, y, x + w, y + r - k, x + w, y + r],
      ['L', x + w, y + h - r], ['C', x + w, y + h - r + k, x + w - r + k, y + h, x + w - r, y + h],
      ['L', x + r, y + h], ['C', x + r - k, y + h, x, y + h - r + k, x, y + h - r],
      ['L', x, y + r], ['C', x, y + r - k, x + r - k, y, x + r, y],
      ['Z'],
    ];
  }

  function ellipsePath(cx, cy, rx, ry) {
    const kx = KAPPA * rx, ky = KAPPA * ry;
    return [
      ['M', cx + rx, cy],
      ['C', cx + rx, cy + ky, cx + kx, cy + ry, cx, cy + ry],
      ['C', cx - kx, cy + ry, cx - rx, cy + ky, cx - rx, cy],
      ['C', cx - rx, cy - ky, cx - kx, cy - ry, cx, cy - ry],
      ['C', cx + kx, cy - ry, cx + rx, cy - ky, cx + rx, cy],
      ['Z'],
    ];
  }

  function starPath(cx, cy, rOut, rIn, points = 5) {
    const cmds = [];
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOut : rIn;
      const a = -Math.PI / 2 + i * Math.PI / points;
      cmds.push([i === 0 ? 'M' : 'L', cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }
    cmds.push(['Z']);
    return cmds;
  }

  // Bounding box over all coordinates in the command list (control points
  // included — conservative for curves, exact for the shapes above).
  function pathBBox(cmds) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const c of cmds) {
      for (let i = 1; i + 1 <= c.length; i += 2) {
        const x = c[i], y = c[i + 1];
        if (typeof x !== 'number' || typeof y !== 'number') continue;
        if (x < x0) x0 = x; if (y < y0) y0 = y;
        if (x > x1) x1 = x; if (y > y1) y1 = y;
      }
    }
    if (x0 === Infinity) return null;
    return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
  }

  // ---------- affine matrices ----------
  // m = [a,b,c,d,e,f]: x' = a·x + c·y + e ; y' = b·x + d·y + f
  function mMul(m2, m1) { // m1 applied first, then m2
    return [
      m2[0] * m1[0] + m2[2] * m1[1], m2[1] * m1[0] + m2[3] * m1[1],
      m2[0] * m1[2] + m2[2] * m1[3], m2[1] * m1[2] + m2[3] * m1[3],
      m2[0] * m1[4] + m2[2] * m1[5] + m2[4], m2[1] * m1[4] + m2[3] * m1[5] + m2[5],
    ];
  }
  function mTranslate(dx, dy) { return [1, 0, 0, 1, dx, dy]; }
  function mScale(sx, sy, cx = 0, cy = 0) { return [sx, 0, 0, sy, cx - sx * cx, cy - sy * cy]; }
  function mRotate(rad, cx = 0, cy = 0) {
    const c = Math.cos(rad), s = Math.sin(rad);
    return [c, s, -s, c, cx - c * cx + s * cy, cy - s * cx - c * cy];
  }
  function mApply(m, x, y) { return [m[0] * x + m[2] * y + m[4], m[1] * x + m[3] * y + m[5]]; }

  function transformCmds(cmds, m) {
    return cmds.map(c => {
      if (c[0] === 'Z') return ['Z'];
      const o = [c[0]];
      for (let i = 1; i + 1 <= c.length; i += 2) {
        const p = mApply(m, c[i], c[i + 1]);
        o.push(p[0], p[1]);
      }
      return o;
    });
  }

  // ---------- flattening, tight bounds, hit testing ----------
  // Flatten to polyline subpaths: [{pts:[[x,y]...], closed}]. Fixed cubic
  // subdivision is plenty for hit tests and bounds at document scale.
  function flattenPath(cmds, seg = 16) {
    const subs = [];
    let cur = null, sx = 0, sy = 0, px = 0, py = 0;
    for (const c of cmds) {
      if (c[0] === 'M') {
        cur = { pts: [[c[1], c[2]]], closed: false };
        subs.push(cur);
        px = sx = c[1]; py = sy = c[2];
      } else if (c[0] === 'L') {
        if (!cur) continue;
        cur.pts.push([c[1], c[2]]);
        px = c[1]; py = c[2];
      } else if (c[0] === 'C') {
        if (!cur) continue;
        for (let i = 1; i <= seg; i++) {
          const t = i / seg, u = 1 - t;
          cur.pts.push([
            u * u * u * px + 3 * u * u * t * c[1] + 3 * u * t * t * c[3] + t * t * t * c[5],
            u * u * u * py + 3 * u * u * t * c[2] + 3 * u * t * t * c[4] + t * t * t * c[6],
          ]);
        }
        px = c[5]; py = c[6];
      } else if (c[0] === 'Z') {
        if (cur) cur.closed = true;
        px = sx; py = sy;
      }
    }
    return subs;
  }

  function tightBBox(cmds) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const s of flattenPath(cmds)) {
      for (const p of s.pts) {
        if (p[0] < x0) x0 = p[0]; if (p[1] < y0) y0 = p[1];
        if (p[0] > x1) x1 = p[0]; if (p[1] > y1) y1 = p[1];
      }
    }
    return x0 === Infinity ? null : { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
  }

  function shapesBBox(shapes) {
    let out = null;
    for (const s of shapes) {
      const b = tightBBox(s.cmds);
      if (!b) continue;
      if (!out) out = { ...b };
      else {
        const x1 = Math.max(out.x + out.w, b.x + b.w), y1 = Math.max(out.y + out.h, b.y + b.h);
        out.x = Math.min(out.x, b.x); out.y = Math.min(out.y, b.y);
        out.w = x1 - out.x; out.h = y1 - out.y;
      }
    }
    return out;
  }

  function windingNumber(pts, x, y) {
    let wn = 0;
    for (let i = 0, n = pts.length; i < n; i++) {
      const a = pts[i], b = pts[(i + 1) % n];
      const cross = (b[0] - a[0]) * (y - a[1]) - (x - a[0]) * (b[1] - a[1]);
      if (a[1] <= y) { if (b[1] > y && cross > 0) wn++; }
      else if (b[1] <= y && cross < 0) wn--;
    }
    return wn;
  }

  function distToSubpath(sub, x, y) {
    const pts = sub.pts, n = pts.length;
    const last = sub.closed ? n : n - 1;
    let d = Infinity;
    for (let i = 0; i < last; i++) {
      const a = pts[i], b = pts[(i + 1) % n];

  if (word === 'null') return { v: null, i: j };
  return { v: { op: word }, i: j === i ? i + 1 : j };
}

/* ------------------------------------------------------------------ */
/* Document: object scan, streams, filters                             */
/* ------------------------------------------------------------------ */

function isName(v, n) { return v && typeof v === 'object' && v.name === n; }

class PDFDoc {
  constructor(bytes) {
    this.bytes = bytes;
    this.S = latin1(bytes);
    this.objects = new Map(); // num -> {value, streamStart?, streamEnd?}
    this.trailer = {};
  }

  resolve(v) {
    let guard = 0;
    while (v && typeof v === 'object' && 'ref' in v && guard++ < 64) {
      const e = this.objects.get(v.ref);
      v = e ? e.value : null;
    }
    return v;
  }

  scan() {
    const S = this.S;
    const objRe = /(\d+)[\0\t\n\f\r ]+(\d+)[\0\t\n\f\r ]+obj\b/g;
    let cursor = 0, m;
    while ((m = objRe.exec(S)) !== null) {
      if (m.index < cursor) continue; // inside a previous stream body
      const num = parseInt(m[1], 10);
      let parsed;
      try { parsed = parseObj(S, m.index + m[0].length); }
      catch (e) { continue; }
      const entry = { value: parsed.v };
      let i = skipWs(S, parsed.i);
      if (S.startsWith('stream', i)) {
        let k = i + 6;
        if (S[k] === '\r') k++;
        if (S[k] === '\n') k++;
        entry.streamStart = k;
        // Locate endstream: trust /Length when it points at one, else search.
        let end = -1;
        const lenV = this.resolveLenient(parsed.v && parsed.v.Length);
        if (typeof lenV === 'number' && lenV >= 0 && k + lenV <= S.length) {
          const probe = skipWs(S, k + lenV);
          if (S.startsWith('endstream', probe)) end = k + lenV;
        }
        if (end < 0) {
          let e = S.indexOf('endstream', k);
          if (e < 0) e = S.length;
          // strip the EOL that precedes endstream
          let t = e;
          if (S[t - 1] === '\n') t--;
          if (S[t - 1] === '\r') t--;
          end = t;
        }
        entry.streamEnd = end;
        const endobj = S.indexOf('endobj', end);
        cursor = endobj < 0 ? end : endobj + 6;
        objRe.lastIndex = cursor;
      }
      if (!this.objects.has(num) || entry.streamStart !== undefined ||
          this.objects.get(num).streamStart === undefined) {
        this.objects.set(num, entry);
      }
    }
    // trailers (classic xref tables)
    const trRe = /trailer\b/g;
    let t;
    while ((t = trRe.exec(S)) !== null) {
      try {
        const d = parseObj(S, t.index + 7).v;
        if (d && typeof d === 'object' && d.Root) Object.assign(this.trailer, d);
      } catch (e) { /* ignore */ }
    }
    // cross-reference streams also carry /Root
    if (!this.trailer.Root) {
      for (const [, e] of this.objects) {
        const v = e.value;
        if (v && typeof v === 'object' && isName(v.Type, 'XRef') && v.Root) {
          Object.assign(this.trailer, { Root: v.Root, Info: v.Info });
          break;
        }
      }
    }
  }

  // Resolve that works during scan (target may not be scanned yet).
  resolveLenient(v) {
    if (v && typeof v === 'object' && 'ref' in v) {
      const e = this.objects.get(v.ref);
      if (e) return e.value;
      // brute: find "<num> 0 obj <int>" in the raw file
      const re = new RegExp('(?:^|[^0-9])(' + String(v.ref) + ')[\\0\\t\\n\\f\\r ]+\\d+[\\0\\t\\n\\f\\r ]+obj\\b');
      const m = re.exec(this.S);
      if (m) {
        try { return parseObj(this.S, m.index + m[0].length).v; } catch (e2) { return null; }
      }
      return null;
    }
    return v;
  }

  rawStream(entry) {
    return this.bytes.subarray(entry.streamStart, entry.streamEnd);
  }

  async decodeStream(entry) {
    let data = this.rawStream(entry);
    const dict = entry.value || {};
    let filters = this.resolve(dict.Filter);
    let parms = this.resolve(dict.DecodeParms || dict.DP);
    if (!filters) return data;
    if (!Array.isArray(filters)) { filters = [filters]; parms = [parms]; }
    else if (!Array.isArray(parms)) { parms = [parms]; }
    for (let i = 0; i < filters.length; i++) {
      const f = this.resolve(filters[i]);
      const p = this.resolve(parms[i]) || null;
      if (isName(f, 'FlateDecode') || isName(f, 'Fl')) {
        data = await inflate(data);
        data = this.applyPredictor(data, p);
      } else if (isName(f, 'ASCIIHexDecode') || isName(f, 'AHx')) {
        const s = latin1(data).replace(/[^0-9a-fA-F>]/g, '');
        const hex = s.replace(/>.*$/, '');
        const out = new Uint8Array(Math.ceil(hex.length / 2));
        for (let k = 0; k < hex.length; k += 2) out[k >> 1] = parseInt(hex.substr(k, 2).padEnd(2, '0'), 16);
        data = out;
      } else if (f) {
        throw new Error('Unsupported stream filter: ' + (f.name || f));
      }
    }
    return data;
  }

  applyPredictor(data, parms) {
    if (!parms) return data;
    const pred = this.resolve(parms.Predictor) || 1;
    if (pred < 2) return data;
    const colors = this.resolve(parms.Colors) || 1;
    const bpc = this.resolve(parms.BitsPerComponent) || 8;
    const columns = this.resolve(parms.Columns) || 1;
    const bpp = Math.max(1, Math.ceil(colors * bpc / 8));
    const rowLen = Math.ceil(colors * bpc * columns / 8);
    if (pred === 2) return data; // TIFF predictor on 8-bit rare; pass through
    // PNG predictors: each row prefixed with a filter-type byte
    const rows = Math.floor(data.length / (rowLen + 1));
    const out = new Uint8Array(rows * rowLen);
    let prev = new Uint8Array(rowLen);
    for (let r = 0; r < rows; r++) {
      const ft = data[r * (rowLen + 1)];
      const src = data.subarray(r * (rowLen + 1) + 1, (r + 1) * (rowLen + 1));
      const dst = out.subarray(r * rowLen, (r + 1) * rowLen);
      for (let x = 0; x < rowLen; x++) {
        const a = x >= bpp ? dst[x - bpp] : 0;
        const b = prev[x];
        const c = x >= bpp ? prev[x - bpp] : 0;
        let v = src[x];
        if (ft === 1) v += a;
        else if (ft === 2) v += b;
        else if (ft === 3) v += (a + b) >> 1;
        else if (ft === 4) {
          const pp = a + b - c, pa = Math.abs(pp - a), pb = Math.abs(pp - b), pc = Math.abs(pp - c);
          v += (pa <= pb && pa <= pc) ? a : (pb <= pc ? b : c);
        }
        dst[x] = v & 0xff;
      }
      prev = dst;
    }
    return out;
  }

  async expandObjectStreams() {
    for (const [, entry] of Array.from(this.objects)) {
      const v = entry.value;
      if (!v || typeof v !== 'object' || !isName(v.Type, 'ObjStm')) continue;
      let data;
      try { data = await this.decodeStream(entry); } catch (e) { continue; }
      const S = latin1(data);
      const N = this.resolve(v.N) || 0;
      const first = this.resolve(v.First) || 0;
      let i = 0;
      const header = [];
      for (let k = 0; k < N; k++) {
        const a = parseObj(S, i); const b = parseObj(S, a.i);
        header.push([a.v, b.v]);
        i = b.i;
      }
      for (const [num, off] of header) {
        if (typeof num !== 'number' || typeof off !== 'number') continue;
        if (this.objects.has(num)) continue; // directly-scanned objects win
        try {
          const parsed = parseObj(S, first + off);
          this.objects.set(num, { value: parsed.v });
        } catch (e) { /* skip bad member */ }
      }
    }
  }

  findCatalog() {
    let root = this.resolve(this.trailer.Root);
    if (root && isName(root.Type, 'Catalog')) return root;
    for (const [, e] of this.objects) {
      const v = e.value;
      if (v && typeof v === 'object' && isName(v.Type, 'Catalog')) return v;
    }
    return null;
  }

  collectPages() {
    const cat = this.findCatalog();
    const pages = [];
    const walk = (node, inherited, depth) => {
      node = this.resolve(node);
      if (!node || typeof node !== 'object' || depth > 64) return;
      const inh = {
        MediaBox: node.MediaBox !== undefined ? node.MediaBox : inherited.MediaBox,
        Resources: node.Resources !== undefined ? node.Resources : inherited.Resources,
        Rotate: node.Rotate !== undefined ? node.Rotate : inherited.Rotate,
      };
      if (isName(node.Type, 'Pages') || (node.Kids && !isName(node.Type, 'Page'))) {
        const kids = this.resolve(node.Kids) || [];
        for (const k of kids) walk(k, inh, depth + 1);
      } else if (isName(node.Type, 'Page') || node.Contents !== undefined) {
        pages.push({ dict: node, inherited: inh });
      }
    };
    if (cat && cat.Pages) walk(cat.Pages, {}, 0);
    if (!pages.length) { // last resort: scan for page dicts
      for (const [, e] of this.objects) {
        const v = e.value;
        if (v && typeof v === 'object' && isName(v.Type, 'Page')) {
          pages.push({ dict: v, inherited: {} });
        }
      }
    }
    return pages;
  }

  async pageContent(pageDict) {
    let contents = this.resolve(pageDict.Contents);
    if (!contents) return new Uint8Array(0);
    if (!Array.isArray(contents)) contents = [pageDict.Contents];
    const parts = [];
    for (const c of contents) {
      const ref = c && typeof c === 'object' && 'ref' in c ? this.objects.get(c.ref) : null;
      const entry = ref || (typeof c === 'object' ? { value: this.resolve(c) } : null);
      if (!entry || entry.streamStart === undefined) continue;
      try { parts.push(await this.decodeStream(entry)); }
      catch (e) { /* skip undecodable part */ }
    }
    let total = 0;
    for (const p of parts) total += p.length + 1;
    const out = new Uint8Array(total);
    let o = 0;
    for (const p of parts) { out.set(p, o); o += p.length; out[o++] = 0x0a; }
    return out;
  }
}

/* ------------------------------------------------------------------ */
/* Matrices & colors                                                   */
/* ------------------------------------------------------------------ */

function matMul(m, n) { // apply m "after" n?  result = n · m (PDF: cm concatenates before CTM)
  return [
    m[0] * n[0] + m[1] * n[2],
    m[0] * n[1] + m[1] * n[3],
    m[2] * n[0] + m[3] * n[2],
    m[2] * n[1] + m[3] * n[3],
    m[4] * n[0] + m[5] * n[2] + n[4],
    m[4] * n[1] + m[5] * n[3] + n[5],
  ];
}
function matApply(m, x, y) {
  return { x: m[0] * x + m[2] * y + m[4], y: m[1] * x + m[3] * y + m[5] };
}
function matScale(m) {
  return Math.sqrt(Math.abs(m[0] * m[3] - m[1] * m[2])) || 1;
}

function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }
function cmyk2rgb(c, m, y, k) {
  return [clamp01((1 - c) * (1 - k)), clamp01((1 - m) * (1 - k)), clamp01((1 - y) * (1 - k))];
}
function colGray(g) { g = clamp01(g); return { space: 'gray', values: [g], rgb: [g, g, g] }; }
function colRGB(r, g, b) { return { space: 'rgb', values: [r, g, b].map(clamp01), rgb: [r, g, b].map(clamp01) }; }
function colCMYK(c, m, y, k) {
  const v = [c, m, y, k].map(clamp01);
  return { space: 'cmyk', values: v, rgb: cmyk2rgb(v[0], v[1], v[2], v[3]) };
}

function colorKey(col) {
  if (!col) return '';
  return col.space + ':' + (col.name || '') + ':' + col.values.map(v => v.toFixed(4)).join(',');
}

/* ------------------------------------------------------------------ */
/* PDF functions (for Separation tint transforms)                      */
/* ------------------------------------------------------------------ */

async function evalFunction(doc, fnRefOrDict, inputs) {
  const entry = fnRefOrDict && typeof fnRefOrDict === 'object' && 'ref' in fnRefOrDict
    ? doc.objects.get(fnRefOrDict.ref) : { value: doc.resolve(fnRefOrDict) };
  if (!entry || !entry.value || typeof entry.value !== 'object') return null;
  const fn = entry.value;
  const type = doc.resolve(fn.FunctionType);
  const domain = (doc.resolve(fn.Domain) || [0, 1]).map(Number);
  const x = Math.min(Math.max(inputs[0], domain[0]), domain[1]);

  if (type === 2) {
    const c0 = (doc.resolve(fn.C0) || [0]).map(Number);
    const c1 = (doc.resolve(fn.C1) || [1]).map(Number);
    const n = doc.resolve(fn.N) || 1;
    const t = Math.pow(x, n);
    const out = [];
    for (let i = 0; i < Math.max(c0.length, c1.length); i++) {
      out.push((c0[i] || 0) + t * ((c1[i] || 0) - (c0[i] || 0)));
    }
    return out;
  }
  if (type === 3) {
    const fns = doc.resolve(fn.Functions) || [];
    const bounds = (doc.resolve(fn.Bounds) || []).map(Number);
    const encode = (doc.resolve(fn.Encode) || []).map(Number);
    let k = 0;
    while (k < bounds.length && x >= bounds[k]) k++;
    const lo = k === 0 ? domain[0] : bounds[k - 1];
    const hi = k === bounds.length ? domain[1] : bounds[k];
    const e0 = encode.length > 2 * k ? encode[2 * k] : 0;
    const e1 = encode.length > 2 * k + 1 ? encode[2 * k + 1] : 1;
    const t = hi === lo ? e0 : e0 + (x - lo) / (hi - lo) * (e1 - e0);
    return evalFunction(doc, fns[k], [t]);
  }
  if (type === 0 && entry.streamStart !== undefined) {
    try {
      const data = await doc.decodeStream(entry);
      const size = (doc.resolve(fn.Size) || [2]).map(Number);
      const bps = doc.resolve(fn.BitsPerSample) || 8;
      const range = (doc.resolve(fn.Range) || []).map(Number);
      const nOut = range.length ? range.length / 2 : 1;
      if (bps !== 8 && bps !== 16) return null;
      const nSamples = size[0];
      const t = (x - domain[0]) / (domain[1] - domain[0] || 1);
      const idx = Math.min(nSamples - 1, Math.round(t * (nSamples - 1)));
      const out = [];
      for (let i = 0; i < nOut; i++) {
        let raw, max;
        if (bps === 8) { raw = data[idx * nOut + i]; max = 255; }
        else { const o = (idx * nOut + i) * 2; raw = (data[o] << 8) | data[o + 1]; max = 65535; }
        const r0 = range.length ? range[2 * i] : 0;
        const r1 = range.length ? range[2 * i + 1] : 1;
        out.push(r0 + (raw / max) * (r1 - r0));
      }
      return out;
    } catch (e) { return null; }
  }
  return null; // Type 4 (PostScript calculator) & exotic cases
}

/* ------------------------------------------------------------------ */
/* Color spaces                                                        */
/* ------------------------------------------------------------------ */

function csFamily(doc, cs) {
  // Returns {kind, n, name?, alt?, tint?} for a resolved colorspace value.
  cs = doc.resolve(cs);
  if (!cs) return { kind: 'gray', n: 1 };
  if (cs.name) {
    switch (cs.name) {
      case 'DeviceGray': case 'CalGray': case 'G': return { kind: 'gray', n: 1 };
      case 'DeviceRGB': case 'CalRGB': case 'RGB': return { kind: 'rgb', n: 3 };
      case 'DeviceCMYK': case 'CMYK': return { kind: 'cmyk', n: 4 };
      case 'Pattern': return { kind: 'pattern', n: 1 };
      default: return { kind: 'gray', n: 1 };
    }
  }
  if (Array.isArray(cs)) {
    const head = doc.resolve(cs[0]);
    const hname = head && head.name;
    if (hname === 'ICCBased') {
      const strm = doc.resolve(cs[1]);
      const n = (strm && doc.resolve(strm.N)) || 3;
      return n === 4 ? { kind: 'cmyk', n: 4 } : n === 1 ? { kind: 'gray', n: 1 } : { kind: 'rgb', n: 3 };
    }
    if (hname === 'CalRGB' || hname === 'Lab') return { kind: 'rgb', n: 3 };
    if (hname === 'CalGray') return { kind: 'gray', n: 1 };
    if (hname === 'Separation') {
      const nm = doc.resolve(cs[1]);
      return { kind: 'separation', n: 1, name: (nm && nm.name) || 'Spot', alt: cs[2], tint: cs[3] };
    }
    if (hname === 'DeviceN') {
      const names = (doc.resolve(cs[1]) || []).map(v => (doc.resolve(v) || {}).name || '?');
      return { kind: 'devicen', n: names.length, name: names.join('+'), alt: cs[2], tint: cs[3] };
    }
    if (hname === 'Indexed') return { kind: 'gray', n: 1 };
    if (hname === 'Pattern') return { kind: 'pattern', n: 1 };
  }
  return { kind: 'gray', n: 1 };
}

async function makeColorFromCS(doc, fam, comps) {
  switch (fam.kind) {
    case 'gray': return colGray(comps[0] !== undefined ? comps[0] : 0);
    case 'rgb': return colRGB(comps[0] || 0, comps[1] || 0, comps[2] || 0);
    case 'cmyk': return colCMYK(comps[0] || 0, comps[1] || 0, comps[2] || 0, comps[3] || 1);
    case 'pattern': return { space: 'pattern', values: [], rgb: [0.5, 0.5, 0.5] };
    case 'separation': case 'devicen': {
      const tint = comps.length ? comps[0] : 1;
      let rgb = null, values = comps.slice();
      const out = await evalFunction(doc, fam.tint, comps.length ? comps : [1]);
      if (out) {
        const altFam = csFamily(doc, fam.alt);
        if (altFam.kind === 'cmyk' && out.length >= 4) rgb = cmyk2rgb(out[0], out[1], out[2], out[3]);
        else if (altFam.kind === 'rgb' && out.length >= 3) rgb = out.slice(0, 3).map(clamp01);
        else if (out.length >= 1) rgb = [clamp01(out[0]), clamp01(out[0]), clamp01(out[0])];
      }
      if (!rgb) { const g = clamp01(1 - tint); rgb = [g, g, g]; } // fallback: tint as darkness
      return { space: 'separation', name: fam.name, values, rgb };
    }
    default: return colGray(0);
  }
}

/* ------------------------------------------------------------------ */
/* Content-stream interpreter                                          */
/* ------------------------------------------------------------------ */

const TEXT_OPS = new Set(['BT', 'ET', 'Tc', 'Tw', 'Tz', 'TL', 'Tf', 'Tr', 'Ts',
  'Td', 'TD', 'Tm', 'T*', 'Tj', 'TJ', "'", '"']);
const IGNORE_OPS = new Set(['ri', 'i', 'j', 'J', 'M', 'd', 'gs', 'sh', 'd0', 'd1',
  'MP', 'DP', 'BMC', 'BDC', 'EMC', 'BX', 'EX', 'CS_UNKNOWN']);

async function runContentStream(doc, contentBytes, resources, gsInit, shapes, depth) {
  if (depth > 12) return;
  const S = latin1(contentBytes);
  let gs = gsInit;
  const gsStack = [];
  const operands = [];

  // path construction state (user space)
  let subpaths = [];      // finished subpaths of current path
  let cur = null;         // {start, segments, closed}
  let cx = 0, cy = 0;     // current point, user space
  let sx = 0, sy = 0;     // subpath start, user space

  const tp = (x, y) => matApply(gs.ctm, x, y);

  function moveTo(x, y) {
    if (cur && cur.segments.length) subpaths.push(cur);
    const p = tp(x, y);
    cur = { start: { x: p.x, y: p.y }, segments: [], closed: false };
    cx = x; cy = y; sx = x; sy = y;
  }
  function lineTo(x, y) {
    if (!cur) moveTo(cx, cy);
    const p = tp(x, y);
    cur.segments.push({ type: 'line', to: { x: p.x, y: p.y } });
    cx = x; cy = y;
  }
  function curveTo(x1, y1, x2, y2, x3, y3) {
    if (!cur) moveTo(cx, cy);
    const c1 = tp(x1, y1), c2 = tp(x2, y2), to = tp(x3, y3);
    cur.segments.push({ type: 'cubic', c1: { x: c1.x, y: c1.y }, c2: { x: c2.x, y: c2.y }, to: { x: to.x, y: to.y } });
    cx = x3; cy = y3;
  }
  function closePath() {
    if (cur) { cur.closed = true; subpaths.push(cur); cur = null; cx = sx; cy = sy; }
  }
  function endPath() { subpaths = []; cur = null; }

  function emit(fill, stroke, fillRule) {
    if (cur && (cur.segments.length || fill)) subpaths.push(cur);
    cur = null;
    const sp = subpaths.filter(p => p.segments.length > 0);
    if (sp.length) {
      shapes.push({
        subpaths: sp,
        fill: fill || null,
        stroke: stroke || null,
        strokeWidth: stroke ? gs.lineWidth * matScale(gs.ctm) : 0,
        fillRule: fillRule || 'nonzero',
      });
    }
    subpaths = [];
  }

  function lookupCS(nameOrVal) {
    if (nameOrVal && nameOrVal.name) {
      const n = nameOrVal.name;
      if (n === 'DeviceGray' || n === 'DeviceRGB' || n === 'DeviceCMYK' || n === 'Pattern' ||
          n === 'G' || n === 'RGB' || n === 'CMYK') {
        return csFamily(doc, nameOrVal);
      }
      const csDict = doc.resolve(resources && resources.ColorSpace) || {};
      if (csDict[n] !== undefined) return csFamily(doc, csDict[n]);
    }
    return csFamily(doc, nameOrVal);
  }

  let i = 0;
  const len = S.length;
  while (i < len) {
    i = skipWs(S, i);
    if (i >= len) break;
    const c = S[i];
    if (c === '/' || c === '(' || c === '<' || c === '[' ||
        c === '+' || c === '-' || c === '.' || (c >= '0' && c <= '9')) {
      const r = parseObj(S, i);
      operands.push(r.v);
      i = r.i;
      continue;
    }
    // operator token
    let j = i;
    while (j < len && !isWs(S[j]) && !isDelim(S[j])) j++;
    const op = S.slice(i, j === i ? i + 1 : j);
    i = j === i ? i + 1 : j;
    const nums = operands.map(v => (typeof v === 'number' ? v : 0));

    try {
      switch (op) {
        /* graphics state */
        case 'q': gsStack.push({ ...gs, fill: gs.fill, stroke: gs.stroke }); break;
        case 'Q': if (gsStack.length) gs = gsStack.pop(); break;
        case 'cm': gs = { ...gs, ctm: matMul(nums.slice(0, 6), gs.ctm) }; break;
        case 'w': gs = { ...gs, lineWidth: nums[0] }; break;

        /* path construction */
        case 'm': moveTo(nums[0], nums[1]); break;
        case 'l': lineTo(nums[0], nums[1]); break;
        case 'c': curveTo(nums[0], nums[1], nums[2], nums[3], nums[4], nums[5]); break;
        case 'v': curveTo(cx, cy, nums[0], nums[1], nums[2], nums[3]); break;
        case 'y': curveTo(nums[0], nums[1], nums[2], nums[3], nums[2], nums[3]); break;
        case 'h': closePath(); break;
        case 're': {
          const [x, y, w, h] = nums;
          moveTo(x, y); lineTo(x + w, y); lineTo(x + w, y + h); lineTo(x, y + h); closePath();
          break;
        }

        /* path painting */
        case 'f': case 'F': emit(gs.fill, null, 'nonzero'); break;
        case 'f*': emit(gs.fill, null, 'evenodd'); break;
        case 'S': emit(null, gs.stroke); break;
        case 's': closePath(); emit(null, gs.stroke); break;
        case 'B': emit(gs.fill, gs.stroke, 'nonzero'); break;
        case 'B*': emit(gs.fill, gs.stroke, 'evenodd'); break;
        case 'b': closePath(); emit(gs.fill, gs.stroke, 'nonzero'); break;
        case 'b*': closePath(); emit(gs.fill, gs.stroke, 'evenodd'); break;
        case 'n': endPath(); break;
        case 'W': case 'W*': break; // clipping ignored (geometry importer)

        /* color */
        case 'g': gs = { ...gs, fill: colGray(nums[0]), fillCS: { kind: 'gray', n: 1 } }; break;
        case 'G': gs = { ...gs, stroke: colGray(nums[0]), strokeCS: { kind: 'gray', n: 1 } }; break;
        case 'rg': gs = { ...gs, fill: colRGB(nums[0], nums[1], nums[2]), fillCS: { kind: 'rgb', n: 3 } }; break;
        case 'RG': gs = { ...gs, stroke: colRGB(nums[0], nums[1], nums[2]), strokeCS: { kind: 'rgb', n: 3 } }; break;
        case 'k': gs = { ...gs, fill: colCMYK(nums[0], nums[1], nums[2], nums[3]), fillCS: { kind: 'cmyk', n: 4 } }; break;
        case 'K': gs = { ...gs, stroke: colCMYK(nums[0], nums[1], nums[2], nums[3]), strokeCS: { kind: 'cmyk', n: 4 } }; break;
        case 'cs': {
          const fam = lookupCS(operands[0]);
          gs = { ...gs, fillCS: fam, fill: await makeColorFromCS(doc, fam, fam.kind === 'cmyk' ? [0, 0, 0, 1] : [0]) };
          break;
        }
        case 'CS': {
          const fam = lookupCS(operands[0]);
          gs = { ...gs, strokeCS: fam, stroke: await makeColorFromCS(doc, fam, fam.kind === 'cmyk' ? [0, 0, 0, 1] : [0]) };
          break;
        }
        case 'sc': case 'scn': {
          const comps = operands.filter(v => typeof v === 'number');
          gs = { ...gs, fill: await makeColorFromCS(doc, gs.fillCS, comps) };
          break;
        }
        case 'SC': case 'SCN': {
          const comps = operands.filter(v => typeof v === 'number');
          gs = { ...gs, stroke: await makeColorFromCS(doc, gs.strokeCS, comps) };
          break;
        }

        /* XObjects */
        case 'Do': {
          const nm = operands[0] && operands[0].name;
          const xobjs = doc.resolve(resources && resources.XObject) || {};
          const ref = nm !== undefined ? xobjs[nm] : null;
          const entry = ref && typeof ref === 'object' && 'ref' in ref
            ? doc.objects.get(ref.ref) : null;
          const xv = entry && entry.value;
          if (xv && isName(xv.Subtype, 'Form') && entry.streamStart !== undefined) {
            let sub;
            try { sub = await doc.decodeStream(entry); } catch (e) { sub = null; }
            if (sub) {
              let ctm = gs.ctm;
              const mtx = doc.resolve(xv.Matrix);
              if (Array.isArray(mtx) && mtx.length === 6) ctm = matMul(mtx.map(Number), ctm);
              const subRes = doc.resolve(xv.Resources) || resources;
              await runContentStream(doc, sub, subRes, { ...gs, ctm }, shapes, depth + 1);
            }
          }
          break;
        }

        /* inline images: skip binary data through EI */
        case 'BI': {
          let e = i;
          for (;;) {
            e = S.indexOf('EI', e);
            if (e < 0) { e = len; break; }
            const before = e === 0 ? ' ' : S[e - 1];
            const after = e + 2 < len ? S[e + 2] : ' ';
            if (isWs(before) && (isWs(after) || isDelim(after) || e + 2 >= len)) { e += 2; break; }
            e += 2;
          }
          i = e;
          break;
        }

        default:
          // text ops & other no-ops: just consume operands
          break;
      }
    } catch (e) { /* keep interpreting; one bad op shouldn't kill the page */ }
    operands.length = 0;
  }
}

/* ------------------------------------------------------------------ */
/* Public API                                                          */
/* ------------------------------------------------------------------ */

async function parsePDF(input) {
  const bytes = toBytes(input);
  const head = latin1(bytes.subarray(0, Math.min(1024, bytes.length)));
  if (head.indexOf('%PDF-') < 0) {
    if (head.indexOf('%!PS-Adobe') === 0) {
      throw new Error('This .ai file has no PDF compatibility (legacy PostScript format). ' +
        'Re-save it from Illustrator with "Create PDF Compatible File" checked.');
    }
    throw new Error('Not a PDF file (missing %PDF header)');
  }

  const doc = new PDFDoc(bytes);
  doc.scan();
  await doc.expandObjectStreams();

  // document metadata / AI detection
  let creator = '', producer = '';
  const info = doc.resolve(doc.trailer.Info);
  if (info && typeof info === 'object') {
    const cv = doc.resolve(info.Creator), pv = doc.resolve(info.Producer);
    if (cv && cv.str) creator = cv.str;
    if (pv && pv.str) producer = pv.str;
  }
  const isAI = /Illustrator/i.test(creator + ' ' + producer) ||
    doc.S.indexOf('Adobe Illustrator') >= 0 || doc.S.indexOf('%%AI') >= 0;

  const pageEntries = doc.collectPages();
  if (!pageEntries.length) throw new Error('No pages found in PDF');

  const docPalette = new Map();
  const pages = [];

  for (const { dict, inherited } of pageEntries) {
    const mb = (doc.resolve(inherited.MediaBox) || [0, 0, 612, 792]).map(v => Number(doc.resolve(v)));
    const x0 = Math.min(mb[0], mb[2]), y0 = Math.min(mb[1], mb[3]);
    const x1 = Math.max(mb[0], mb[2]), y1 = Math.max(mb[1], mb[3]);
    let w = x1 - x0, h = y1 - y0;
    const rotate = ((Number(doc.resolve(inherited.Rotate)) || 0) % 360 + 360) % 360;

    // Base matrix: PDF user space (y-up, origin at MediaBox lower-left)
    // -> app space (y-down, origin top-left), with /Rotate applied.
    let base = [1, 0, 0, -1, -x0, y1]; // unrotated
    if (rotate === 90) { base = [0, 1, 1, 0, -y0, -x0]; const t = w; w = h; h = t; }
    else if (rotate === 180) { base = [-1, 0, 0, 1, x1, -y0]; }
    else if (rotate === 270) { base = [0, -1, -1, 0, y1, x1]; const t = w; w = h; h = t; }

    const shapes = [];
    const resources = doc.resolve(inherited.Resources) || {};
    const content = await doc.pageContent(dict);
    const gs0 = {
      ctm: base,
      fill: colGray(0), stroke: colGray(0),
      fillCS: { kind: 'gray', n: 1 }, strokeCS: { kind: 'gray', n: 1 },
      lineWidth: 1,
    };
    await runContentStream(doc, content, resources, gs0, shapes, 0);

    const pagePalette = new Map();
    for (const s of shapes) {
      for (const col of [s.fill, s.stroke]) {
        if (!col) continue;
        const key = colorKey(col);
        for (const map of [pagePalette, docPalette]) {
          const cur2 = map.get(key);
          if (cur2) cur2.uses++;
          else map.set(key, { space: col.space, values: col.values.slice(), rgb: col.rgb.slice(), name: col.name, uses: 1 });
        }
      }
    }

    pages.push({
      width: w, height: h,
      shapes,
      colors: Array.from(pagePalette.values()),
    });
  }

  return {
    pageCount: pages.length,
    isAI,
    creator, producer,
    colors: Array.from(docPalette.values()),
    pages,
  };
}

/* ------------------------------------------------------------------ */
/* Exports                                                             */
/* ------------------------------------------------------------------ */

const api = global.VecPDF || (global.VecPDF = {});
api.parsePDF = parsePDF;
api._internal = { latin1, strToBytes, parseObj, inflate, cmyk2rgb };

if (typeof module !== 'undefined' && module.exports) {
  module.exports = api;
}

<script>
/*
 * pdfexport.js
 * --------------------
 * Flat vector-PDF writer at artboard size. Takes the same shape model
 * that pdf-import.js produces (top-left origin, y-down, points) and
 * writes a single-page PDF 1.4 with plain path fills/strokes — no
 * layers, no transparency groups, no fonts. RGB and grayscale colors
 * are written natively; CMYK colors are preserved as CMYK (k/K);
 * separation/spot colors are flattened to their RGB appearance.
 *
 * Browser: window.VecPDF.exportPDF(doc) -> Uint8Array
 * Node:    require('./pdf-export.js').exportPDF(doc)
 *
 * doc = {
 *   width, height,          // artboard size in points (required)
 *   shapes: [ {             // same model as pdf-import.js
 *     subpaths: [ {start:{x,y}, segments:[seg], closed} ],
 *     fill:   {space, values, rgb} | null,
 *     stroke: {space, values, rgb} | null,
 *     strokeWidth,
 *     fillRule: 'nonzero' | 'evenodd'
 *   } ],
 *   title?, creator?        // Info dictionary strings
 * }
 */
(function (global) {
'use strict';

function fmt(n) {
  if (!isFinite(n)) n = 0;
  // enough precision for print work, short enough to keep files small
  const s = Math.abs(n) < 1e-4 ? '0' : n.toFixed(4).replace(/\.?0+$/, '');
  return s === '-0' ? '0' : s;
}

function colorOps(col, isStroke) {
  if (!col) return '';
  const up = isStroke;
  if (col.space === 'cmyk' && col.values && col.values.length === 4) {
    return col.values.map(fmt).join(' ') + (up ? ' K' : ' k');
  }
  if (col.space === 'gray' && col.values && col.values.length === 1) {
    return fmt(col.values[0]) + (up ? ' G' : ' g');
  }
  const rgb = col.rgb || [0, 0, 0];
  return rgb.map(fmt).join(' ') + (up ? ' RG' : ' rg');
}

function pathOps(subpaths) {
  const out = [];
  for (const sp of subpaths || []) {
    if (!sp || !sp.start) continue;
    out.push(fmt(sp.start.x) + ' ' + fmt(sp.start.y) + ' m');
    for (const seg of sp.segments || []) {
      if (seg.type === 'line') {
        out.push(fmt(seg.to.x) + ' ' + fmt(seg.to.y) + ' l');
      } else if (seg.type === 'cubic') {
        out.push(
          fmt(seg.c1.x) + ' ' + fmt(seg.c1.y) + ' ' +
          fmt(seg.c2.x) + ' ' + fmt(seg.c2.y) + ' ' +
          fmt(seg.to.x) + ' ' + fmt(seg.to.y) + ' c');
      }
    }
    if (sp.closed) out.push('h');
  }
  return out;
}

function paintOp(shape) {
  const eo = shape.fillRule === 'evenodd';
  if (shape.fill && shape.stroke) return eo ? 'B*' : 'B';
  if (shape.fill) return eo ? 'f*' : 'f';
  if (shape.stroke) return 'S';
  return 'n';
}

function buildContent(doc) {
  const lines = [];
  // Flip to top-left-origin y-down space so shape coordinates can be
  // written exactly as stored. All geometry goes inside this one q/Q.
  lines.push('q');
  lines.push('1 0 0 -1 0 ' + fmt(doc.height) + ' cm');
  for (const shape of doc.shapes || []) {
    if (!shape || !shape.subpaths || !shape.subpaths.length) continue;
    if (!shape.fill && !shape.stroke) continue;
    lines.push('q');
    if (shape.fill) lines.push(colorOps(shape.fill, false));
    if (shape.stroke) {
      lines.push(colorOps(shape.stroke, true));
      lines.push(fmt(shape.strokeWidth || 1) + ' w');
    }
    lines.push(...pathOps(shape.subpaths));
    lines.push(paintOp(shape));
    lines.push('Q');
  }
  lines.push('Q');
  return lines.join('\n');
}

function escapePdfString(s) {
  return String(s).replace(/[\\()]/g, ch => '\\' + ch).replace(/[^\x20-\x7e]/g, ' ');
}

function strToBytes(s) {
  const b = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i) & 0xff;
  return b;
}

/**
 * Build a flat vector PDF. Returns a Uint8Array.
 */
function exportPDF(doc) {
  if (!doc || !(doc.width > 0) || !(doc.height > 0)) {
    throw new Error('exportPDF: doc.width and doc.height (points) are required');
  }
  const content = buildContent(doc);
  const title = escapePdfString(doc.title || 'Untitled');
  const creator = escapePdfString(doc.creator || 'vecsrc Vector Studio');

  const objects = [];
  objects[1] = '<< /Type /Catalog /Pages 2 0 R >>';
  objects[2] = '<< /Type /Pages /Kids [3 0 R] /Count 1 >>';
  objects[3] = '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' +
    fmt(doc.width) + ' ' + fmt(doc.height) + '] /Contents 4 0 R /Resources << >> >>';
  objects[4] = '<< /Length ' + content.length + ' >>\nstream\n' + content + '\nendstream';
  objects[5] = '<< /Title (' + title + ') /Creator (' + creator + ') /Producer (vecsrc pdf-export) >>';

  let out = '%PDF-1.4\n%\xe2\xe3\xcf\xd3\n';
  const offsets = [0];
  for (let i = 1; i < objects.length; i++) {
    offsets[i] = out.length;
    out += i + ' 0 obj\n' + objects[i] + '\nendobj\n';
  }
  const xrefPos = out.length;
  out += 'xref\n0 ' + objects.length + '\n';
  out += '0000000000 65535 f \n';
  for (let i = 1; i < objects.length; i++) {
    out += String(offsets[i]).padStart(10, '0') + ' 00000 n \n';
  }
  out += 'trailer\n<< /Size ' + objects.length + ' /Root 1 0 R /Info 5 0 R >>\n';
  out += 'startxref\n' + xrefPos + '\n%%EOF\n';

  return strToBytes(out);
}

/**
 * Convenience: trigger a browser download of the exported PDF.
 */
function downloadPDF(doc, filename) {
  const bytes = exportPDF(doc);
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || (doc.title ? doc.title + '.pdf' : 'export.pdf');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

const api = global.VecPDF || (global.VecPDF = {});
api.exportPDF = exportPDF;
api.downloadPDF = downloadPDF;

if (typeof module !== 'undefined' && module.exports) {
  module.exports = api;
}

})(typeof window !== 'undefined' ? window : globalThis);

<script>
// PDFIO — bridges VecPDF (pdfimport.js / pdfexport.js) onto the VECCORE
// document model. Import turns PDF/.ai vector pages into veccore shapes
// with color capture; export writes the artboard as a flat vector PDF.
//
// Color capture: shapes render with hex fills like everything else, but
// non-RGB source colors (CMYK builds, grayscale, spot inks) keep their
// print data in shape.fillInfo / shape.strokeInfo — {space, values, name}
// — and the document gets a doc.swatches palette. Export prefers that
// info over the hex preview, so CMYK/gray survive an import→edit→export
// trip; spot plates can build on doc.swatches later.
const PDFIO = (() => {
  'use strict';

  const C = typeof VECCORE !== 'undefined' ? VECCORE : require('./veccore.js');
  const P = (() => {
    if (typeof VecPDF !== 'undefined') return VecPDF;
    const api = require('./pdfimport.js');
    require('./pdfexport.js'); // merges exportPDF into the same namespace
    return api;
  })();

  // ---------- colors ----------
  function rgbToHex(rgb) {
    return '#' + rgb.map(v => {
      const n = Math.round(Math.max(0, Math.min(1, v)) * 255);
      return n.toString(16).padStart(2, '0');
    }).join('');
  }

  function hexToRgb(hex) {
    let h = String(hex || '').replace('#', '');
    if (h.length === 3) h = h.replace(/./g, ch => ch + ch);
    if (!/^[0-9a-fA-F]{6}$/.test(h)) return [0, 0, 0];
    const n = parseInt(h, 16);
    return [(n >> 16 & 255) / 255, (n >> 8 & 255) / 255, (n & 255) / 255];
  }

  const PRINT_SPACES = { cmyk: 1, gray: 1, separation: 1 };

  function colorInfo(col) { // print-color data worth keeping past the hex preview
    if (!col || !PRINT_SPACES[col.space]) return null;
    const o = { space: col.space, values: col.values.slice() };
    if (col.name) o.name = col.name;
    return o;
  }

  // veccore fill/stroke (+ optional info) -> VecPDF color
  function toExportColor(hex, info) {
    if (info && PRINT_SPACES[info.space] && Array.isArray(info.values)) {
      return { space: info.space, values: info.values.slice(), rgb: hexToRgb(hex), name: info.name };
    }
    const rgb = hexToRgb(hex);
    return { space: 'rgb', values: rgb, rgb };
  }

  // ---------- geometry ----------
  // VecPDF subpaths -> veccore cmds
  function cmdsFromSubpaths(subpaths) {
    const cmds = [];
    for (const sp of subpaths) {
      cmds.push(['M', sp.start.x, sp.start.y]);
      for (const seg of sp.segments) {
        if (seg.type === 'cubic') {
          cmds.push(['C', seg.c1.x, seg.c1.y, seg.c2.x, seg.c2.y, seg.to.x, seg.to.y]);
        } else {
          cmds.push(['L', seg.to.x, seg.to.y]);
        }
      }
      if (sp.closed) cmds.push(['Z']);
    }
    return cmds;
  }

  // veccore cmds -> VecPDF subpaths
  function subpathsFromCmds(cmds) {
    const subs = [];
    let cur = null;
    for (const c of cmds) {
      if (c[0] === 'M') {
        cur = { start: { x: c[1], y: c[2] }, segments: [], closed: false };
        subs.push(cur);
      } else if (!cur) {
        continue;
      } else if (c[0] === 'L') {
        cur.segments.push({ type: 'line', to: { x: c[1], y: c[2] } });
      } else if (c[0] === 'C') {
        cur.segments.push({
          type: 'cubic',
          c1: { x: c[1], y: c[2] }, c2: { x: c[3], y: c[4] }, to: { x: c[5], y: c[6] },
        });
      } else if (c[0] === 'Z') {
        cur.closed = true;
        cur = null;
      }
    }
    return subs.filter(s => s.segments.length);
  }

  // ---------- import ----------
  function shapesFromPage(page) {
    return page.shapes.map((s, i) => {
      const shape = {
        type: 'path',
        name: (s.fill && s.fill.name) || (s.stroke && s.stroke.name) || 'Path ' + (i + 1),
        cmds: cmdsFromSubpaths(s.subpaths),
        fill: s.fill ? rgbToHex(s.fill.rgb) : null,
        stroke: s.stroke ? { color: rgbToHex(s.stroke.rgb), w: s.strokeWidth || 1 } : null,
        opacity: 1,
      };
      const fi = s.fill && colorInfo(s.fill);
      const si = s.stroke && colorInfo(s.stroke);
      if (fi) shape.fillInfo = fi;
      if (si) shape.strokeInfo = si;
      return shape;
    });
  }

  // Parse PDF/.ai bytes into a fresh veccore doc (one page -> one artboard).
  // Returns {doc, pageCount, isAI, colors}.
  async function docFromPDF(bytes, filename, pageIndex = 0) {
    const parsed = await P.parsePDF(bytes);
    const page = parsed.pages[Math.max(0, Math.min(pageIndex, parsed.pages.length - 1))];
    const doc = C.newDoc({ w: page.width / 72, h: page.height / 72, units: 'in' });
    doc.name = String(filename || 'Imported').replace(/\.(pdf|ai)$/i, '');
    for (const s of shapesFromPage(page)) C.addShape(doc, s);
    doc.swatches = parsed.colors.map(c => ({
      space: c.space, values: c.values, rgb: c.rgb, name: c.name || null, uses: c.uses,
    }));
    return { doc, pageCount: parsed.pageCount, isAI: parsed.isAI, colors: parsed.colors };
  }

  // ---------- export ----------
  // Visible-layer shapes only, in z order. Opacity is not representable in
  // the flat exporter and is dropped (shapes export fully opaque).
  function exportShapes(doc) {
    const hidden = new Set((doc.layers || []).filter(l => !l.visible).map(l => l.id));
    const out = [];
    for (const s of doc.shapes) {
      if (hidden.has(s.layer)) continue;
      const subpaths = subpathsFromCmds(s.cmds);
      if (!subpaths.length) continue;
      if (s.fill == null && !s.stroke) continue;
      out.push({
        subpaths,
        fill: s.fill != null ? toExportColor(s.fill, s.fillInfo) : null,
        stroke: s.stroke ? toExportColor(s.stroke.color, s.strokeInfo) : null,
        strokeWidth: s.stroke ? s.stroke.w : 0,
        fillRule: 'nonzero',
      });
    }
    return out;
  }

  // Flat vector PDF of the whole artboard. Returns a Uint8Array.
  function exportDocPDF(doc) {
    return P.exportPDF({
      width: doc.artboard.w,
      height: doc.artboard.h,
      shapes: exportShapes(doc),
      title: doc.name || 'Untitled',
    });
  }

  return {
    docFromPDF, exportDocPDF, exportShapes, shapesFromPage,
    cmdsFromSubpaths, subpathsFromCmds, rgbToHex, hexToRgb,
  };
})();
if (typeof module !== 'undefined') module.exports = PDFIO;
if (typeof window !== 'undefined') window.PDFIO = PDFIO;
